<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashers Education and Institutes</title>
  <style>
    :root {
      --bg: #050505;
      --surface: #0f0f0f;
      --border: #1e1e1e;
      --accent: #00d2ff;
      --text: #d1d1d1;
      --text-mute: #555;
      --nav-h: 40px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    body { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    
    nav {
      height: var(--nav-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 10px;
    }

    #tabs { display: flex; gap: 2px; height: 100%; align-items: flex-end; overflow-x: auto; }
    
    .t {
      background: #151515;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--text-mute);
      cursor: pointer;
      min-width: 100px;
      max-width: 160px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      white-space: nowrap;
    }
    .t.active { background: var(--bg); color: var(--accent); border-top: 2px solid var(--accent); padding-bottom: 7px; }
    .t .c { margin-left: 8px; font-size: 14px; opacity: 0.5; }
    .t .c:hover { color: #ff4b2b; opacity: 1; }

    .add { color: var(--text-mute); cursor: pointer; padding: 0 10px; font-size: 18px; }
    .add:hover { color: var(--accent); }

    .omni { flex: 1; display: none; }
    .omni.v { display: block; }
    .omni input {
      width: 100%;
      background: #000;
      border: 1px solid var(--border);
      padding: 4px 10px;
      color: var(--accent);
      font-family: inherit;
      font-size: 11px;
    }

  
    #dash {
      height: calc(100vh - var(--nav-h));
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #dash.v { display: flex; }

    .search-wrap { width: 90%; max-width: 480px; }
    .id-tag { font-size: 10px; color: var(--text-mute); margin-bottom: 8px; letter-spacing: 1px; }
    
    .box { display: flex; border: 1px solid var(--border); background: var(--surface); }
    .box input { flex: 1; background: transparent; border: none; padding: 14px; color: #fff; font-size: 14px; font-family: inherit; }
    .box button {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--accent);
      padding: 0 18px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      font-family: inherit;
    }
    .box button:hover { background: var(--accent); color: #000; }

 
    #frames { position: fixed; top: var(--nav-h); left: 0; width: 100%; height: calc(100vh - var(--nav-h)); display: none; }
    #frames.v { display: block; }
    iframe { width: 100%; height: 100%; border: none; display: none; background: #fff; }
    iframe.active { display: block; }

    .foot { position: fixed; bottom: 0; width: 100%; padding: 4px 10px; font-size: 9px; color: var(--text-mute); border-top: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; }
  </style>
</head>
<body>

  <nav>
    <div id="tabs"></div>
    <div class="add" onclick="tm.createTab()">+</div>
    <div class="omni" id="omni">
      <input type="text" id="omniIn" placeholder="NAVIGATE_">
    </div>
  </nav>

  <div id="frames"></div>

  <div id="dash" class="v">
    <div class="search-wrap">
      <div class="id-tag">Dashers Education</div>
      <form id="sForm" class="box">
        <input type="text" id="sIn" placeholder="Enter search term or URL" autocomplete="off">
        <button type="submit">EXECUTE</button>
      </form>
    </div>
  </div>

  <div class="foot">
    <span>Dashers Education and institutes</span>
    <span></span>
  </div>

  <script>
    function uvEnc(str) {
      if (!str) return str;
      return encodeURIComponent(str.split('').map((char, ind) => ind % 2 ? String.fromCharCode(char.charCodeAt() ^ 2) : char).join(''));
    }

    let tabs = [];
    let activeId = null;

    class TabManager {
      constructor() {
        this.tList = document.getElementById('tabs');
        this.fWrap = document.getElementById('frames');
        this.dash = document.getElementById('dash');
        this.omni = document.getElementById('omni');
        this.oIn = document.getElementById('omniIn');
        
        this.oIn.onkeypress = (e) => { if (e.key === 'Enter') this.nav(this.oIn.value); };
        this.createTab();
      }

      createTab(url = null, raw = "", title = "New session") {
        const id = 't' + Date.now();
        const tel = document.createElement('div');
        tel.className = 't';
        tel.id = `ui-${id}`;
        tel.innerHTML = `<span class="ttl">${title}</span><span class="c" onclick="event.stopPropagation(); tm.close('${id}')">×</span>`;
        tel.onclick = () => this.switch(id);
        this.tList.appendChild(tel);

        const ifr = document.createElement('iframe');
        ifr.id = `f-${id}`;
        if (url) ifr.src = url;
        this.fWrap.appendChild(ifr);

        tabs.push({ id, url, raw, title, tel, ifr });
        this.switch(id);
      }

      switch(id) {
        if (!tabs.find(t => t.id === id)) return;
        activeId = id;
        document.querySelectorAll('.t').forEach(t => t.classList.remove('active'));
        document.getElementById(`ui-${id}`).classList.add('active');
        
        const tab = tabs.find(t => t.id === id);
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

        if (tab.url && tab.url !== "about:blank") {
          this.dash.classList.remove('v');
          this.fWrap.classList.add('v');
          this.omni.classList.add('v');
          this.oIn.value = tab.raw;
          tab.ifr.classList.add('active');
        } else {
          this.dash.classList.add('v');
          this.fWrap.classList.remove('v');
          this.omni.classList.remove('v');
        }
      }

      nav(input) {
        if (!input) return;
        let url = input.trim();
        const isUrl = /^(http|https):\/\//.test(url) || (url.includes('.') && !url.includes(' '));
        
        if (!isUrl) {
          url = "https://search.brave.com/search?q=" + encodeURIComponent(url);
        } else if (!/^https?:\/\//i.test(url)) {
          url = "https://" + url;
        }
        
        const enc = "/service/" + uvEnc(url);
        const tab = tabs.find(t => t.id === activeId);
        if (tab) {
          tab.url = enc;
          tab.raw = url;
          tab.tel.querySelector('.ttl').innerText = url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0].toUpperCase();
          tab.ifr.src = enc;
          this.switch(activeId);
        }
      }

      close(id) {
        const i = tabs.findIndex(t => t.id === id);
        if (i === -1) return;
        if (tabs.length === 1) {
            tabs[0].url = null;
            tabs[0].tel.querySelector('.ttl').innerText = "INIT_SESSION";
            tabs[0].ifr.src = "about:blank";
            this.switch(id);
            return;
        }
        tabs[i].tel.remove();
        tabs[i].ifr.remove();
        tabs.splice(i, 1);
        this.switch(tabs[Math.max(0, i - 1)].id);
      }
    }

    const tm = new TabManager();
    document.getElementById('sForm').onsubmit = (e) => {
      e.preventDefault();
      const val = document.getElementById('sIn').value.trim();
      if (val) { tm.nav(val); document.getElementById('sIn').value = ''; }
    };
  </script>
</body>
</html>
