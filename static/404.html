<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS_MSG :: 404</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --border: #1e1e1e;
            --accent: #00d2ff;
            --text: #d1d1d1;
            --text-mute: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px;
            position: relative;
        }

        .header-tag {
            font-size: 10px;
            color: var(--text-mute);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .error-code {
            font-size: 40px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #fff;
        }

        .error-message {
            color: var(--text-mute);
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn:hover {
            background: var(--accent);
            color: #000;
        }

        .abort-btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--text-mute);
            font-size: 10px;
            text-decoration: none;
            text-transform: uppercase;
        }

        .abort-btn:hover {
            color: #ff4b2b;
        }

        
        .progress-bar {
            height: 2px;
            width: 100%;
            background: var(--border);
            margin-top: 25px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 30%;
            background: var(--accent);
            animation: slide 1.5s infinite linear;
        }

        @keyframes slide {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="error-content">
            <div class="header-tag">
                <span>STATUS: 404</span>
                <span>ID: 404E</span>
            </div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Destination Not Found</h2>
            <p class="error-message">The requested page is unresponsive or the path has been decommissioned.</p>
            <a href="javascript:void(0)" onclick="gohome();" class="btn">Return to Root</a>
        </div>

        <div id="proxy-content" class="hidden">
            <div class="header-tag">
                <span>STATUS: 101</span>
                <span>ACTION: SW_REGISTRATION</span>
            </div>
            <h1 class="error-code">...</h1>
            <h2 class="error-title">Waking Server...</h2>
            <p class="error-message">Establishing secure tunnel protocol. If handshake fails, click the override below.</p>
            
            <form id="regform">
                <button id="uv-register-sw" class="btn" type="submit" onclick="window.location.reload(1);">
                    Manual Override
                </button>
            </form>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <a href="javascript:void(0)" onclick="gohome();" class="abort-btn">Term Sesssion</a>
        </div>
    </div>

    <script>
        
        if(window.location.href.includes("/service/")) {
            document.getElementById("error-content").classList.add("hidden");
            document.getElementById("proxy-content").classList.remove("hidden");
            document.title = "SYS_MSG :: INITIALIZING";
        }
        
        function gohome() {
            window.location.href = window.location.origin;
        }
    </script>

    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>
    <script src="/register-sw.js" defer></script>
    <script src="/search.js" defer></script>
    <script src="/scripts/load.js" defer></script>
    <script src="/error.js" defer></script>
</body>
</html>
