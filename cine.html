  aspect-ratio: 16 / 9; 
  border-radius: 8px;

}

  content: '';
  position: absolute;
  top: 0;
  left: 0;

}

      iosPromptClose: document.querySelector('.ios-prompt-close'),
      vipSettingsGroup: document.getElementById('vip-settings-group')
  };

  const lazyLoadObserver = new IntersectionObserver((entries, observer) =&gt; {
      entries.forEach(entry =&gt; {
          if (entry.isIntersecting) {
              const grid = entry.target;
              const itemsJson = grid.dataset.items;
              
              const isTvBox = grid.dataset.tvBox === &quot;true&quot;;
              
              if (itemsJson) {
                  const items = JSON.parse(itemsJson);
                  
                  generateCards(items, grid, isTvBox);
                  grid.removeAttribute('data-items');
                  observer.unobserve(grid);
              }
          }
      });
  }, { rootMargin: '0px 0px 400px 0px', threshold: 0.01 });

  function detectIosAndPrompt() {
      const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent) &amp;&amp; !window.MSStream;
      const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
      const hasSeenPrompt = sessionStorage.getItem('iosPromptSeen');

      if (isIos &amp;&amp; !isStandalone &amp;&amp; !hasSeenPrompt) {
          setTimeout(() =&gt; {
              if(DOMElements.iosPrompt) {
                  DOMElements.iosPrompt.style.display = 'block';
                  sessionStorage.setItem('iosPromptSeen', 'true');
              }
          }, 3000);
      }
  }

  if (DOMElements.iosPromptClose) {
      DOMElements.iosPromptClose.addEventListener('click', () =&gt; {
          DOMElements.iosPrompt.style.display = 'none';
      });
  }

  function checkVipStatus() {
      if (localStorage.getItem('cineHubVipToken') === 'true') {
          isVip = true;
          applyVipTheme();
      } else {
          isVip = false;
          removeVipTheme();
      }
  }

  function applyVipTheme() {
      DOMElements.body.classList.add('vip-active');
      DOMElements.vipLoginBtn.style.display = 'none';
      DOMElements.vipStatusContainer.style.display = 'flex';
      const themeToggle = document.querySelector('#vip-settings-group input[type=&quot;checkbox&quot;][disabled]');
      if(themeToggle) themeToggle.disabled = false;
  }
  
  function removeVipTheme() {
      DOMElements.body.classList.remove('vip-active');
      DOMElements.vipLoginBtn.style.display = 'block';
      DOMElements.vipStatusContainer.style.display = 'none';
      const themeToggle = document.querySelector('#vip-settings-group input[type=&quot;checkbox&quot;]');
      if(themeToggle) themeToggle.disabled = true;
  }

  function handleVipLogin(e) {
      e.preventDefault();
      const username = document.getElementById('vip-username').value;
      const password = document.getElementById('vip-password').value;
      const foundUser = vipUsers.find(cred =&gt; cred.user === username &amp;&amp; cred.pass === password);

      if (foundUser) {
          localStorage.setItem('cineHubVipToken', 'true');
          DOMElements.vipLoginModal.style.display = 'none';
          DOMElements.vipLoginForm.reset();
          DOMElements.vipLoginError.style.display = 'none';
          checkVipStatus();
          if(document.getElementById('dashboard').classList.contains('active')) {
              renderDashboardContent();
          }
      } else {
          DOMElements.vipLoginError.style.display = 'block';
      }
  }

  function handleVipLogout() {
      localStorage.removeItem('cineHubVipToken');
      checkVipStatus();
      renderDashboardContent();
  }

  function showVipPrompt() {
      DOMElements.vipPromptModal.style.display = 'flex';
  }

  function lockScroll() { document.body.style.overflow = 'hidden'; }
  function unlockScroll() { document.body.style.overflow = ''; }

  function loadUserData() {
      userData.continueWatching = JSON.parse(localStorage.getItem('cineHubContinueWatching')) || [];
      userData.watchlist = JSON.parse(localStorage.getItem('cineHubWatchlist')) || [];
      userData.watched = JSON.parse(localStorage.getItem('cineHubWatched')) || [];
  }

  function saveUserData() {
      localStorage.setItem('cineHubContinueWatching', JSON.stringify(userData.continueWatching));
      localStorage.setItem('cineHubWatchlist', JSON.stringify(userData.watchlist));
      localStorage.setItem('cineHubWatched', JSON.stringify(userData.watched));
  }
  
  function closeSidebar() { document.body.classList.remove('sidebar-open'); }
  function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

  function getYoutubeVideoId(url) {
      if (!url) return null; let videoId = null;
      try {
          if (url.includes(&quot;youtube.com/watch&quot;)) videoId = new URL(url).searchParams.get('v');
          else if (url.includes(&quot;youtu.be/&quot;)) videoId = new URL(url).pathname.substring(1);
      } catch (e) { console.error(&quot;Invalid URL:&quot;, url, e); }
      return videoId;
  }

  function renderAnnouncements() {
      const container = DOMElements.announcementContainer;
      if (!container || !announcements || announcements.length === 0) return;
      container.innerHTML = '';
      const announcementText = announcements[0];
      const banner = document.createElement('div');
      banner.className = 'announcement-banner';
      banner.innerHTML = `&lt;span class=&quot;icon&quot;&gt;&lt;i class=&quot;fas fa-bullhorn&quot;&gt;&lt;/i&gt;&lt;/span&gt;&lt;p&gt;${announcementText}&lt;/p&gt;&lt;button class=&quot;close-btn&quot;&gt;&amp;times;&lt;/button&gt;`;
      banner.querySelector('.close-btn').addEventListener('click', () =&gt; {
          banner.classList.add('dismissed');
          setTimeout(() =&gt; banner.remove(), 300);
      });
      container.appendChild(banner);
  }

function renderHeroBanner(item) {
      const container = DOMElements.heroBannerContainer;
      if (!container || !item) return;
      container.innerHTML = ''; 
      
      
      const displayImage = Array.isArray(item.imageUrl) 
          ? item.imageUrl[Math.floor(Math.random() * item.imageUrl.length)] 
          : item.imageUrl;
      

      const banner = document.createElement('div');
      banner.className = 'hero-banner';
      
      
      banner.style.backgroundImage = `url('${displayImage}')`;
      
      const isEarlyAccess = item.accessLevel === 'early-access';
      const isVipOnly = item.accessLevel === 'vip-only';
      const isLocked = (isVipOnly || isEarlyAccess) &amp;&amp; !isVip;

      banner.innerHTML = `
          &lt;div class=&quot;hero-overlay&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;hero-left-vignette&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;hero-content&quot;&gt;
              &lt;h1 class=&quot;hero-title&quot;&gt;${item.title}&lt;/h1&gt;
              &lt;div class=&quot;hero-meta&quot;&gt;
                  &lt;span class=&quot;rating&quot;&gt;${item.rating}&lt;/span&gt;
                  &lt;span class=&quot;year&quot;&gt;${item.year || '2024'}&lt;/span&gt;
                  ${isVipOnly ? '&lt;span style=&quot;color:var(--vip-gold)&quot;&gt;VIP Exclusive&lt;/span&gt;' : ''}
              &lt;/div&gt;
              &lt;p class=&quot;hero-description&quot;&gt;${item.description}&lt;/p&gt;
              &lt;div class=&quot;hero-buttons&quot;&gt;
                  &lt;button class=&quot;hero-btn play&quot;&gt;
                      &lt;i class=&quot;fas ${isLocked ? 'fa-lock' : 'fa-play'}&quot;&gt;&lt;/i&gt; ${isLocked ? 'Unlock' : 'Play'}
                  &lt;/button&gt;
                  &lt;button class=&quot;hero-btn info&quot;&gt;
                      &lt;i class=&quot;fas fa-info-circle&quot;&gt;&lt;/i&gt; More Info
                  &lt;/button&gt;
              &lt;/div&gt;
          &lt;/div&gt;
      `;

      const playBtn = banner.querySelector('.hero-btn.play');
      const infoBtn = banner.querySelector('.hero-btn.info');

      playBtn.addEventListener('click', () =&gt; {
          if (isLocked) {
              showVipPrompt();
          } else {
              addToContinueWatching(item);
              if(item.type === 'movie') {
                  playMovieFromPreview(item);
              } else {
                  showPreviewModal(item);
              }
          }
      });

      infoBtn.addEventListener('click', () =&gt; {
          showPreviewModal(item);
      });

      container.appendChild(banner);
  }

  function renderDashboardContent() {
      DOMElements.dynamicCategoriesContainer.innerHTML = '';
      renderAnnouncements();

      
      
      if (typeof heroIds !== 'undefined' &amp;&amp; heroIds.length &gt; 0) {
          const randomHeroId = heroIds[Math.floor(Math.random() * heroIds.length)];
          if (movieData[randomHeroId]) {
              renderHeroBanner(movieData[randomHeroId]);
          }
      } else if (typeof heroId !== 'undefined' &amp;&amp; movieData[heroId]) {
          
          renderHeroBanner(movieData[heroId]);
      } else {
          DOMElements.heroBannerContainer.innerHTML = '';
      }
      
      
      renderAllCategories();
  }


  function renderAllCategories() {
      const continueWatchingItems = (userData.continueWatching || [])
          .map(cw =&gt; movieData[cw.id])
          .filter(item =&gt; item &amp;&amp; !isWatched(item.id));
      if (userData.watchlist?.length &gt; 0) createCategorySection(&quot;My List&quot;, userData.watchlist.map(id =&gt; movieData[id]).filter(Boolean));
      if (continueWatchingItems.length &gt; 0) createCategorySection(&quot;Continue Watching&quot;, continueWatchingItems);
      
      categories.forEach(cat =&gt; {
          const items = cat.contentIds.map(id =&gt; movieData[id]).filter(Boolean);
          if (items.length &gt; 0) {
               
               createCategorySection(cat.title, items, DOMElements.dynamicCategoriesContainer, cat.isTvBox); 
          }
      });
      
      const allContent = Object.values(movieData).filter(item =&gt; item.type !== 'upcoming'); 
      createCategorySection(&quot;All Movies &amp; Series&quot;, allContent);
  }

  
  function createCategorySection(title, items, containerElement = DOMElements.dynamicCategoriesContainer, isTvBox = false) {
      if (!items || items.length === 0 || !containerElement) return;
      const container = document.createElement('div');
      container.className = 'category-container';
      const grid = document.createElement('div');
      grid.className = 'movie-grid-horizontal';
      
      
      if (isTvBox) {

  function generateCards(items, container, isTvBoxStyle = false) {
      if (!container) return;
      container.innerHTML = '';
      if (!items) return;
      
      const isMainGrid = container.classList.contains('content-grid') || container.id === 'search-grid-container';

      const fragment = document.createDocumentFragment();
      items.forEach((item, index) =&gt; {
          if (!item) return;
          const card = createCard(item, { animationDelay: index * 50 }, isTvBoxStyle);
          
          if (isMainGrid) {
              if (index % 7 === 0 &amp;&amp; index !== 0) {
                  card.classList.add('card-wide');
              } 
              else if (index % 13 === 0 &amp;&amp; index !== 0) {
                  card.classList.add('card-large');
              }
          }

          fragment.appendChild(card);
      });
      container.appendChild(fragment);
  };

  
 function createCard(item, options = {}, isTvBoxStyle = false) { 
const card = document.createElement('div');
 card.className = 'movie-card';

const displayImage = Array.isArray(item.imageUrl) 
? item.imageUrl[Math.floor(Math.random() * item.imageUrl.length)]
 : item.imageUrl;
      
      
      if (isTvBoxStyle) {
          card.classList.add('tv-box-style');
      }

      const isVipOnly = item.accessLevel === 'vip-only';
      const isLocked = (isVipOnly || isEarlyAccess) &amp;&amp; !isVip;
  
      if (item.type === 'upcoming' &amp;&amp; !isEarlyAccess) card.classList.add('is-upcoming');
      if (isEarlyAccess &amp;&amp; !isVip) card.classList.add('early-access');
      
      if (options.animationDelay) card.style.animationDelay = `${options.animationDelay}ms`;

      let displayTagsHTML = '';
      if (item.displayTags &amp;&amp; item.displayTags.length &gt; 0) {
          const tag = item.displayTags[0];
          const className = tag.toLowerCase().replace(/ /g, '-');
          displayTagsHTML = `&lt;div class=&quot;card-tag-ribbon ${className}&quot;&gt;${tag}&lt;/div&gt;`;
      }

      let vipBadgeHTML = '';
      if (isVipOnly) {
          vipBadgeHTML = `&lt;div class=&quot;vip-exclusive-badge&quot;&gt;&lt;i class=&quot;fas fa-star&quot;&gt;&lt;/i&gt; VIP&lt;/div&gt;`;
      } else if (isEarlyAccess) {
           vipBadgeHTML = `&lt;div class=&quot;vip-exclusive-badge&quot; style=&quot;background-color: var(--tag-new-release-bg);&quot;&gt;&lt;i class=&quot;fas fa-clock&quot;&gt;&lt;/i&gt; Early Access&lt;/div&gt;`;
      }
      
      const isInWatchlist = userData.watchlist?.includes(item.id);
      const watchlistIcon = isInWatchlist ? 'fa-check' : 'fa-plus';
      
      let actionsHTML = '';

      if (isPlayable) {
           actionsHTML += `&lt;button class=&quot;card-action-btn play&quot; title=&quot;Play&quot;&gt;&lt;i class=&quot;fas ${isLocked ? 'fa-lock' : 'fa-play'}&quot;&gt;&lt;/i&gt;&lt;/button&gt;`;
      }
      actionsHTML += `&lt;button class=&quot;card-action-btn add-watchlist&quot; title=&quot;${isInWatchlist ? 'In My List' : 'Add to My List'}&quot;&gt;&lt;i class=&quot;fas ${watchlistIcon}&quot;&gt;&lt;/i&gt;&lt;/button&gt;`;
      if (item.type === 'upcoming' &amp;&amp; !isEarlyAccess) {
           actionsHTML += `&lt;button class=&quot;card-action-btn remind&quot; title=&quot;Remind Me&quot;&gt;&lt;i class=&quot;fas fa-bell&quot;&gt;&lt;/i&gt;&lt;/button&gt;`;
      }

            card.innerHTML = `${vipBadgeHTML}${displayTagsHTML}&lt;div class=&quot;card-image-container&quot;&gt;&lt;img src=&quot;${displayImage}&quot; alt=&quot;${item.title}&quot; loading=&quot;lazy&quot;&gt;&lt;/div&gt;&lt;div class=&quot;card-content&quot;&gt;&lt;h3 class=&quot;card-title&quot;&gt;${item.title}&lt;/h3&gt;&lt;div class=&quot;card-info&quot;&gt;&lt;span class=&quot;card-rating&quot;&gt;${item.rating}&lt;/span&gt;&lt;span&gt;${item.type}&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;card-actions&quot;&gt;${actionsHTML}&lt;/div&gt;`; 
      
      card.addEventListener('click', (e) =&gt; {
          if (!e.target.closest('.card-action-btn')) {
              isLocked ? showVipPrompt() : showPreviewModal(item);
          }
      });

      const playBtn = card.querySelector('.play');
      if (playBtn) {
          playBtn.addEventListener('click', (e) =&gt; {
              e.stopPropagation();
              if (isLocked) {
                  showVipPrompt();
              } else {
                  addToContinueWatching(item);
                  playMovieFromPreview(item);
              }
          });
      }

      card.querySelector('.add-watchlist')?.addEventListener('click', (e) =&gt; {
          e.stopPropagation();
          toggleWatchlist(item, e.currentTarget.querySelector('i'));
      });

          e.stopPropagation();
          e.currentTarget.classList.toggle('active');

      if (itemIndex &gt; -1) { userData.watchlist.splice(itemIndex, 1); } else { userData.watchlist.push(item.id); }
      saveUserData();

      if (DOMElements.previewModal.style.display === 'flex' &amp;&amp; currentPreviewItem?.id === item.id) { DOMElements.previewWatchlistBtn.classList.add('pop'); setTimeout(() =&gt; DOMElements.previewWatchlistBtn.classList.remove('pop'), 400); }
      const dashboardView = document.getElementById('dashboard');
      if (dashboardView &amp;&amp; dashboardView.classList.contains('active')) { renderDashboardContent(); } else if (dashboardView) { dashboardView.dataset.loaded = &quot;false&quot;; }

      if (item.type === 'series') { populateSeriesData(item); }
      else { const recommendations = getRecommendations(item.id); DOMElements.moreLikeThisGrid.innerHTML = ''; recommendations.forEach(rec =&gt; { const card = document.createElement('div'); card.className = 'more-like-this-card'; card.innerHTML = `&lt;img src=&quot;${rec.imageUrl}&quot; alt=&quot;${rec.title}&quot;&gt;&lt;span class=&quot;title&quot;&gt;${rec.title}&lt;/span&gt;`; card.addEventListener('click', () =&gt; showPreviewModal(rec)); DOMElements.moreLikeThisGrid.appendChild(card); }); }
      DOMElements.previewModal.style.display = 'flex';
  }

  const renderEpisodesForSeason = (series, seasonNum) =&gt; {
      DOMElements.episodesList.innerHTML = '';
      if (series.episodes &amp;&amp; series.episodes[seasonNum]) {
          series.episodes[seasonNum].forEach((ep, index) =&gt; {
              let episodeNum = index + 1;
              const episodeId = `${series.id}_s${seasonNum}_e${episodeNum}`;
              const hasWatched = userData.watched?.includes(episodeId);
  
              const episodeItem = document.createElement('div');
              episodeItem.className = 'episode-item';
              if (hasWatched) episodeItem.classList.add('watched');
  
              const episodeImageUrl = ep.imageUrl || series.imageUrl;
  
              episodeItem.innerHTML = `
                  &lt;span class=&quot;episode-number&quot;&gt;${episodeNum}&lt;/span&gt;
                  &lt;div class=&quot;episode-thumbnail&quot;&gt;
                      &lt;img src=&quot;${episodeImageUrl}&quot; alt=&quot;${ep.name}&quot;&gt;
                  &lt;/div&gt;
                  &lt;div class=&quot;episode-details&quot;&gt;
                      &lt;p class=&quot;episode-title&quot;&gt;${ep.name}&lt;/p&gt;

                  &lt;/div&gt;
                  &lt;div class=&quot;episode-action&quot;&gt;
                      &lt;i class=&quot;fas ${hasWatched ? 'fa-check-circle' : 'fa-play'}&quot;&gt;&lt;/i&gt;
                  &lt;/div&gt;
              `;
  
              episodeItem.addEventListener('click', () =&gt; {
                  playMovie(ep, {
                      seriesId: series.id,
                      episodeId: episodeId,
                      season: seasonNum,
                      episodeIndex: index,
                      title: `S${seasonNum} E${episodeNum}: ${ep.name}`,
                      thumbnailUrl: episodeImageUrl
                  });
              });
              DOMElements.episodesList.appendChild(episodeItem);
          });
      }
  };
  
  const populateSeriesData = (series) =&gt; {
      const seasonSelector = DOMElements.seasonSelector;
      seasonSelector.innerHTML = '';
      const seasonNumbers = series.episodes ? Object.keys(series.episodes) : [];
  
      if (seasonNumbers.length &gt; 0) {
          seasonNumbers.forEach(num =&gt; {
              const tab = document.createElement('button');
              tab.className = 'season-tab';
              tab.textContent = `Season ${num}`;
              tab.dataset.season = num;
  
              if (series.seasonImages &amp;&amp; series.seasonImages[num]) {
                  tab.dataset.seasonImage = series.seasonImages[num];
              }
  
              tab.addEventListener('click', () =&gt; {
                  seasonSelector.querySelector('.active')?.classList.remove('active');
                  tab.classList.add('active');
  
                  if (!series.previewVideoUrl) {
                      const newImageUrl = tab.dataset.seasonImage || series.imageUrl;
                      DOMElements.previewBgImage.style.opacity = 0;
                      setTimeout(() =&gt; {
                         DOMElements.previewBgImage.src = newImageUrl;
                         DOMElements.previewBgImage.style.opacity = 1;
                      }, 300);
                  }
  
                  renderEpisodesForSeason(series, num);
              });
              seasonSelector.appendChild(tab);
          });
  
          const firstTab = seasonSelector.querySelector('.season-tab');
          if (firstTab) {
              firstTab.classList.add('active');
              if (!series.previewVideoUrl) {
                  const initialImageUrl = firstTab.dataset.seasonImage || series.imageUrl;
                  DOMElements.previewBgImage.src = initialImageUrl;
              }
              renderEpisodesForSeason(series, firstTab.dataset.season);

  function playMovieFromPreview(item) {
      if (!item) return;
      if (item.type === 'series') {
          if (item.episodes) {
              const firstSeason = Object.keys(item.episodes)[0];
              if (firstSeason &amp;&amp; item.episodes[firstSeason].length &gt; 0) {
                  const firstEp = item.episodes[firstSeason][0];
                  playMovie(firstEp, {
                      seriesId: item.id,
                      season: firstSeason,
                      episodeIndex: 0,
                      title: `S${firstSeason} E1: ${firstEp.name}`,
                      thumbnailUrl: firstEp.imageUrl || item.imageUrl
                  });
              }
          }
      } else {
          playMovie(item, {
              movieId: item.id,
              title: item.title,
              thumbnailUrl: item.imageUrl
          });
      }
  }

  function playMovie(item, data = {}, serverType = 'standard') {
      const url = (item.servers &amp;&amp; item.servers[serverType]) ? item.servers[serverType] : (item.url || (item.servers &amp;&amp; item.servers.standard));
      if (!url || url === '#') { return; }
      if (youtubePlayer) { youtubePlayer.destroy(); youtubePlayer = null; }

      currentlyPlaying = { item, data };

      lockScroll();
      DOMElements.movieIframe.src = url;
      DOMElements.iframeTitle.textContent = data.title || 'Now Playing';
      DOMElements.iframePlayerOverlay.style.display = 'flex';
      DOMElements.previewModal.style.display = 'none';

      DOMElements.iframeServerSelector.innerHTML = '';
      if (isVip &amp;&amp; item.servers &amp;&amp; item.servers.vip &amp;&amp; item.servers.standard) {
          const standardBtn = document.createElement('button');
          standardBtn.className = 'server-btn';
          standardBtn.textContent = 'Standard';
          standardBtn.onclick = () =&gt; playMovie(item, data, 'standard');
          
          const vipBtn = document.createElement('button');
          vipBtn.className = 'server-btn';
          vipBtn.innerHTML = `&lt;i class=&quot;fas fa-star&quot;&gt;&lt;/i&gt; VIP`;
          vipBtn.onclick = () =&gt; playMovie(item, data, 'vip');

          if (serverType === 'vip') {
              vipBtn.classList.add('active');
          } else {
              standardBtn.classList.add('active');
          }

          DOMElements.iframeServerSelector.appendChild(standardBtn);
          DOMElements.iframeServerSelector.appendChild(vipBtn);
      }
  }

  function addToContinueWatching(item) {
      if (!item || isWatched(item.id)) return;
      userData.continueWatching = (userData.continueWatching || []).filter(cw =&gt; cw.id !== item.id);
      userData.continueWatching.unshift({ id: item.id, timestamp: Date.now() });
      userData.continueWatching.splice(20);
      saveUserData();
  }

  function updateWatchlistButton(itemId) { 
      if (!currentPreviewItem || (currentPreviewItem.type === 'upcoming' &amp;&amp; currentPreviewItem.accessLevel !== 'early-access')) return; 
      const isInWatchlist = userData.watchlist?.includes(itemId); 
      const icon = DOMElements.previewWatchlistBtn.querySelector('i'); 
      if (icon) { icon.className = isInWatchlist ? 'fas fa-check' : 'fas fa-plus' }; 
      DOMElements.previewWatchlistBtn.title = isInWatchlist ? &quot;Remove from My List&quot; : &quot;Add to My List&quot;;
  }
  
  function getRecommendations(itemId) { 
      const sourceCategories = categories.filter(cat =&gt; cat.contentIds.includes(itemId)); 
      const recommendations = new Set; 
      sourceCategories.forEach(cat =&gt; { cat.contentIds.forEach(id =&gt; { if (id !== itemId) recommendations.add(id) }) }); 
      return Array.from(recommendations).slice(0, 6).map(id =&gt; movieData[id] || {}).filter(item =&gt; item.id);
  }

  function markAsWatched(data) {
      if (!data) return;
      const idToMark = data.episodeId || data.movieId;
      if (idToMark &amp;&amp; !userData.watched.includes(idToMark)) {
          userData.watched.push(idToMark);
      }
      const contentId = data.seriesId || data.movieId;
      if (contentId &amp;&amp; isWatched(contentId)) {
          userData.continueWatching = userData.continueWatching.filter(cw =&gt; cw.id !== contentId);
      }
      saveUserData();
  }

  function isWatched(id) {
      if (!userData.watched) return false;
      const item = movieData[id];
      if (!item) return false;
      if (item.type === 'movie') {
          return userData.watched.includes(id);
      } else if (item.type === 'series' &amp;&amp; item.episodes) {
          const allEpisodeIds = Object.keys(item.episodes).flatMap((seasonNum) =&gt;
              item.episodes[seasonNum].map((_, index) =&gt; `${id}_s${seasonNum}_e${index + 1}`)
          );
          return allEpisodeIds.length &gt; 0 &amp;&amp; allEpisodeIds.every(epId =&gt; userData.watched.includes(epId));
      }
      return false;
  }

  function showExitConfirmation() {
      if (!currentlyPlaying) {
          handleExitPlayer();
          return;
      }
      const modal = DOMElements.exitConfirmationModal;
      const modalContent = modal.querySelector('.modal-content');
      modalContent.innerHTML = `
      &lt;img src=&quot;${currentlyPlaying.data.thumbnailUrl || ''}&quot; alt=&quot;&quot; class=&quot;exit-modal-bg&quot;&gt;
      &lt;div class=&quot;exit-modal-content&quot;&gt;
          &lt;h2&gt;Leaving So Soon?&lt;/h2&gt;
          &lt;p&gt;Did you finish watching? You can mark it as watched to clear it from your list.&lt;/p&gt;
          &lt;div class=&quot;modal-buttons&quot;&gt;
              &lt;button id=&quot;exit-confirm-no&quot; class=&quot;modal-button cancel&quot;&gt;Keep Watching&lt;/button&gt;
              &lt;button id=&quot;exit-confirm-yes&quot; class=&quot;modal-button proceed&quot;&gt;Finish &amp; Mark Watched&lt;/button&gt;
          &lt;/div&gt;
      &lt;/div&gt;
  `;
      modal.querySelector('#exit-confirm-yes').addEventListener('click', () =&gt; {
          markAsWatched(currentlyPlaying.data);
          modal.style.display = 'none';
          handleExitPlayer();
      });
      modal.querySelector('#exit-confirm-no').addEventListener('click', () =&gt; {
          if (currentlyPlaying) {
              const contentId = currentlyPlaying.data.seriesId || currentlyPlaying.data.movieId;
              if (contentId &amp;&amp; movieData[contentId]) {
                  addToContinueWatching(movieData[contentId]);
              }
          }
          modal.style.display = 'none';
          handleExitPlayer();
      });
      modal.style.display = 'flex';
  }

  function handleExitPlayer() {
      DOMElements.iframePlayerOverlay.style.display = 'none';
      DOMElements.movieIframe.src = '';
      currentlyPlaying = null;
      if (currentPreviewItem) {
          showPreviewModal(currentPreviewItem);

  function renderUpcomingView() {
      const container = document.getElementById('upcoming');
      if (!container) return;
      container.innerHTML = ''; 

      const upcomingItems = Object.values(movieData).filter(item =&gt; item.type === 'upcoming');

      const groupedByCategory = upcomingItems.reduce((acc, item) =&gt; {
          const category = item.upcomingCategory || 'Coming Soon';
          if (!acc[category]) {
              acc[category] = [];
          }
          acc[category].push(item);
          return acc;
      }, {});

      const categoryOrder = ['Coming This Week', 'Highly Anticipated',  'Coming Soon', 'Worth the Wait'];
      categoryOrder.forEach(categoryTitle =&gt; {
          if (groupedByCategory[categoryTitle]) {

             console.log('Setting changed:', e.target.checked);

  function switchView(viewId) {
      document.querySelectorAll('.view-content').forEach(v =&gt; v.classList.remove('active'));
      const activeView = document.getElementById(viewId);
      if (activeView) activeView.classList.add('active');

      switch (viewId) {
          case 'dashboard': renderDashboardContent(); break;
          case 'trending': renderGridView('trending', item =&gt; item.displayTags?.includes('Top Pick') || item.displayTags?.includes('Fan Favorite')); break;
          case 'upcoming': renderUpcomingView(); break;
          case 'series': renderGridView('series', item =&gt; item.type === 'series'); break;
          case 'movies': renderGridView('movies', item =&gt; item.type === 'movie'); break;
          case 'settings': renderSettingsState(); break;

      DOMElements.searchCloseBtn.style.display = query ? 'block' : 'none'; 
      if (query) { 
          document.body.classList.add('search-active'); 
          lockScroll(); 
          DOMElements.searchOverlay.style.display = 'block'; 
          setTimeout(() =&gt; { DOMElements.searchOverlay.style.opacity = '1'; }, 10); 
          const results = Object.values(movieData).filter(item =&gt; item.title.toLowerCase().includes(query)); 
          if (results.length &gt; 0) { 
              DOMElements.noResultsMessage.style.display = 'none'; 
              const topResults = results.slice(0, 4); 
              DOMElements.topResultsList.innerHTML = ''; 
              topResults.forEach(item =&gt; { 
                  const li = document.createElement('li'); 
                  li.textContent = item.title; 
                  li.className = 'top-result-item'; 
                  li.onclick = () =&gt; {

                      isLocked ? showVipPrompt() : showPreviewModal(item);

                  DOMElements.topResultsList.appendChild(li); 
              }); 
              DOMElements.topResultsContainer.style.display = 'block'; 
              DOMElements.searchGridContainer.style.display = 'grid'; 
              generateCards(results, DOMElements.searchGridContainer) 
          } else { 
              DOMElements.topResultsContainer.style.display = 'none'; 
              DOMElements.searchGridContainer.style.display = 'none'; 
              DOMElements.noResultsMessage.style.display = 'block' 
          } 
      } else {

      } 
  });

});

        &lt;div id=&quot;standard-controls&quot;&gt;
            &lt;div class=&quot;pb-controls&quot; style=&quot;justify-content: center;&quot;&gt;
                &lt;button class=&quot;ctrl-btn&quot; id=&quot;btn-shuffle&quot; onclick=&quot;player.toggleShuffle()&quot;&gt;&lt;i class=&quot;fas fa-random&quot;&gt;&lt;/i&gt;&lt;/button&gt;
                &lt;button class=&quot;ctrl-btn&quot; onclick=&quot;player.prev()&quot;&gt;&lt;i class=&quot;fas fa-step-backward&quot;&gt;&lt;/i&gt;&lt;/button&gt;
                &lt;div class=&quot;play-circle&quot; onclick=&quot;player.togglePlay()&quot;&gt;&lt;i class=&quot;fas fa-play&quot; id=&quot;main-play-icon&quot;&gt;&lt;/i&gt;&lt;/div&gt;
                &lt;button class=&quot;ctrl-btn&quot; onclick=&quot;player.next()&quot;&gt;&lt;i class=&quot;fas fa-step-forward&quot;&gt;&lt;/i&gt;&lt;/button&gt;
                &lt;button class=&quot;ctrl-btn&quot; id=&quot;btn-loop&quot; onclick=&quot;player.toggleLoop()&quot;&gt;&lt;i class=&quot;fas fa-redo&quot;&gt;&lt;/i&gt;&lt;/button&gt;
            &lt;/div&gt;
            &lt;div class=&quot;progress-area&quot;&gt;
                &lt;span id=&quot;time-curr&quot;&gt;0:00&lt;/span&gt;
                &lt;input type=&quot;range&quot; id=&quot;seek-bar&quot; min=&quot;0&quot; max=&quot;100&quot; value=&quot;0&quot;&gt;
                &lt;span id=&quot;time-dur&quot;&gt;0:00&lt;/span&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div id=&quot;drive-player-container&quot;&gt;
            &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;pb-right&quot;&gt;
        &lt;i class=&quot;fas fa-volume-up ctrl-btn&quot; id=&quot;vol-icon&quot; onclick=&quot;player.toggleMute()&quot;&gt;&lt;/i&gt;
        &lt;div class=&quot;vol-slider-wrap&quot;&gt;
            &lt;input type=&quot;range&quot; id=&quot;vol-bar&quot; min=&quot;0&quot; max=&quot;1&quot; step=&quot;0.01&quot; value=&quot;1&quot;&gt;
        &lt;/div&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;div id=&quot;context-menu&quot;&gt;
    &lt;div class=&quot;ctx-item&quot; onclick=&quot;data.ctxAddToLiked()&quot;&gt;Add to Liked Songs&lt;/div&gt;
    &lt;div class=&quot;ctx-item&quot;&gt;
        &lt;span&gt;Add to Playlist&lt;/span&gt; &lt;i class=&quot;fas fa-caret-right&quot;&gt;&lt;/i&gt;
        &lt;div class=&quot;ctx-submenu&quot; id=&quot;ctx-pl-list&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
    
    
    
    const LOCAL_DATABASE = [
        {
            id: 'drake_one_dance', title: &quot;One Dance&quot;, artist: &quot;Drake&quot;, album: &quot;Views&quot;,
            cover: &quot;https://i1.sndcdn.com/artworks-Wa4BkYH67j8ang1m-1WgOmw-t500x500.jpg&quot;,
            url: &quot;https://drive.google.com/file/d/1MPasajSHd_yV5ev1_x7oulImHxRa8wsC/preview&quot;, 
            duration: &quot;2:54&quot;, isDrive: true
        }
    ];

    
    let CURRENT_DB = [...LOCAL_DATABASE];

    
    const state = {
        queue: [], currentIndex: 0, isPlaying: false,
        userPlaylists: JSON.parse(localStorage.getItem('cinify_playlists')) || [],
        likedIds: JSON.parse(localStorage.getItem('cinify_liked')) || [],
        savedSongsCache: JSON.parse(localStorage.getItem('cinify_cache')) || {}, 
        ctxTarget: null 
    };

    const api = {
        
        search: async (term, entity='song') =&gt; {
            try {
                
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&amp;entity=${entity}&amp;limit=25`);
                const data = await res.json();
                return data.results.map(item =&gt; api.normalize(item));
            } catch (e) {
                console.error(&quot;API Error:&quot;, e);
                return [];
            }
        },

        
        normalize: (item) =&gt; {
            return {
                id: String(item.trackId),
                title: item.trackName,
                artist: item.artistName,
                album: item.collectionName,
                
                cover: item.artworkUrl100 ? item.artworkUrl100.replace('100x100bb', '600x600bb') : '',
                url: item.previewUrl, 
                duration: api.fmtMillis(item.trackTimeMillis),
                isDrive: false
            };
        },

        fmtMillis: (ms) =&gt; {
            if(!ms) return &quot;0:30&quot;;
            const min = Math.floor(ms / 60000);
            const sec = ((ms % 60000) / 1000).toFixed(0);
            return min + &quot;:&quot; + (sec &lt; 10 ? '0' : '') + sec;
        }
    };

    
    const audio = new Audio();
    audio.crossOrigin = &quot;anonymous&quot;; 
    
    function getArtists(list) {
        const artists = [...new Set(list.map(s =&gt; s.artist))];
        return artists.map(name =&gt; {
            const song = list.find(s =&gt; s.artist === name);
            return { name: name, cover: song.cover };
        }).slice(0, 8); 
    }

    const app = {
        init: async () =&gt; {
            
            setTimeout(() =&gt; { document.getElementById('intro-overlay').classList.add('fade-out'); }, 2200);
            setTimeout(() =&gt; { document.getElementById('intro-overlay').style.display='none'; }, 3000);

            
            audio.addEventListener('timeupdate', app.updateProgress);
            audio.addEventListener('ended', player.onEnded);
            
            
            document.getElementById('seek-bar').addEventListener('input', (e) =&gt; {
                if(!audio.duration || isNaN(audio.duration)) return;
                const time = (e.target.value / 100) * audio.duration;
                if(isFinite(time)) audio.currentTime = time;
                app.updateRangeColor(e.target);
            });
            
            document.getElementById('vol-bar').addEventListener('input', (e) =&gt; {
                audio.volume = e.target.value;
                app.updateRangeColor(e.target);
                player.updateVolIcon();
            });

            
            document.addEventListener('click', (e) =&gt; {
                if(!e.target.closest('.ctx-item')) document.getElementById('context-menu').style.display = 'none';
            });

            
            document.getElementById('main-scroll').addEventListener('scroll', (e) =&gt; {
                const top = document.getElementById('top-bar');
                if(e.target.scrollTop &gt; 60) top.classList.add('scrolled');
                else top.classList.remove('scrolled');
            });

            
            data.renderSidebar();
            
            
            const hits = await api.search('top hits 2024');
            CURRENT_DB = [...LOCAL_DATABASE, ...hits];
            
            app.nav('home');
            
            
            state.queue = [...CURRENT_DB];
            player.loadSong(0, false);
        },

        nav: async (view, param) =&gt; {
            const container = document.getElementById('view-container');
            const searchInput = document.getElementById('search-input');
            
            document.querySelectorAll('.nav-item').forEach(el =&gt; el.classList.remove('active'));
            searchInput.style.display = (view === 'search') ? 'block' : 'none';
            if(view === 'search') searchInput.focus();

            container.innerHTML = `&lt;div class=&quot;loader&quot; style=&quot;display:block&quot;&gt;&lt;/div&gt;`; 

            if(view === 'home') {
                app.renderHome(container);
            }
            else if (view === 'search') {
                container.innerHTML = `
                    &lt;div class=&quot;content-area&quot;&gt;
                        &lt;div style=&quot;color:#b3b3b3; margin-bottom:20px;&quot;&gt;Press Enter to search...&lt;/div&gt;
                        &lt;h2&gt;Top Results&lt;/h2&gt;
                        &lt;div class=&quot;card-grid&quot; id=&quot;search-grid&quot;&gt;&lt;/div&gt;
                    &lt;/div&gt;`;
                app.populateGrid(CURRENT_DB, 'search-grid');
            } 
            else if (view === 'artist') {
                
                const artistSongs = await api.search(param);
                
                const localSongs = LOCAL_DATABASE.filter(s =&gt; s.artist === param);
                const allSongs = [...localSongs, ...artistSongs];
                app.renderArtistPage(container, param, allSongs);
            }
            else if (view === 'liked') {
                const songs = state.likedIds.map(id =&gt; state.savedSongsCache[id]).filter(Boolean);
                app.renderPlaylistPage(container, {name:&quot;Liked Songs&quot;, desc:&quot;Your favorites&quot;}, songs, true);
            }
            else if (view === 'playlist') {
                const pl = state.userPlaylists.find(p =&gt; p.id === param);
                if(pl) {
                    const songs = pl.songs.map(id =&gt; state.savedSongsCache[id]).filter(Boolean);
                    app.renderPlaylistPage(container, {name:pl.name, desc:&quot;User Playlist&quot;}, songs, false);
                }
            }
        },

        renderHome: (container) =&gt; {
            const artists = getArtists(CURRENT_DB);
            
            const recent = CURRENT_DB.slice(0, 10); 
            
            container.innerHTML = `
                &lt;div class=&quot;content-area&quot;&gt;
                    &lt;h1 style=&quot;color:white; margin-bottom:24px;&quot;&gt;Good ${new Date().getHours() &lt; 12 ? 'morning' : 'evening'}&lt;/h1&gt;
                    
                    &lt;div class=&quot;section-title&quot;&gt;Trending Artists&lt;/div&gt;
                    &lt;div class=&quot;card-grid&quot;&gt;
                        ${artists.map(a =&gt; `
                            &lt;div class=&quot;card&quot; onclick=&quot;app.nav('artist', '${a.name.replace(/'/g, &quot;\\'&quot;)}')&quot;&gt;
                                &lt;div class=&quot;card-img circle&quot; style=&quot;background-image:url('${a.cover}')&quot;&gt;&lt;/div&gt;
                                &lt;div class=&quot;card-title&quot;&gt;${a.name}&lt;/div&gt;&lt;div class=&quot;card-desc&quot;&gt;Artist&lt;/div&gt;
                            &lt;/div&gt;
                        `).join('')}
                    &lt;/div&gt;

                    &lt;div class=&quot;section-title&quot;&gt;Charts &amp; Favorites&lt;/div&gt;
                    &lt;div class=&quot;card-grid&quot;&gt;
                        ${recent.map(s =&gt; app.createCardHtml(s)).join('')}
                    &lt;/div&gt;
                &lt;/div&gt;
            `;
        },

        renderArtistPage: (container, artistName, songs) =&gt; {
            const cover = songs.length &gt; 0 ? songs[0].cover : '';
            
            // Update current context queue to this artist
            // We only do this if user clicks play, handled in table generation
            
            container.innerHTML = `
                &lt;div class=&quot;playlist-banner&quot; style=&quot;background-image: linear-gradient(rgba(0,0,0,0.3), #121212), url('${cover}'); background-size:cover; background-position:center 20%;&quot;&gt;
                    &lt;div class=&quot;banner-info&quot;&gt;
                        &lt;div style=&quot;font-size:14px; font-weight:700; display:flex; align-items:center;&quot;&gt;Verified Artist 
                            &lt;span class=&quot;verified-badge&quot;&gt;&lt;i class=&quot;fas fa-certificate verified-bg&quot;&gt;&lt;/i&gt;&lt;i class=&quot;fas fa-check verified-check&quot;&gt;&lt;/i&gt;&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;h1 style=&quot;font-size:90px;&quot;&gt;${artistName}&lt;/h1&gt;
                        &lt;div style=&quot;font-size:14px;&quot;&gt;${songs.length.toLocaleString()} Tracks Available&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;content-area&quot;&gt;
                    &lt;div class=&quot;play-circle&quot; style=&quot;width:56px; height:56px; background:#1db954; font-size:24px; margin-bottom:24px;&quot; 
                         onclick=&quot;player.playContext(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(songs))}')))&quot;&gt;
                        &lt;i class=&quot;fas fa-play&quot;&gt;&lt;/i&gt;
                    &lt;/div&gt;
                    ${app.generateSongTable(songs)}
                &lt;/div&gt;
            `;
        },

        renderPlaylistPage: (container, meta, songs, isLiked) =&gt; {
            const bg = isLiked ? 'linear-gradient(135deg, #450af5, #c4efd9)' : '#333';
            container.innerHTML = `
                &lt;div class=&quot;playlist-banner&quot; style=&quot;background:linear-gradient(transparent, #121212); background-color:#5038a0;&quot;&gt;
                    &lt;div class=&quot;banner-art&quot; style=&quot;background:${bg}; color:white;&quot;&gt;
                        ${isLiked ? '&lt;i class=&quot;fas fa-heart&quot;&gt;&lt;/i&gt;' : '&lt;i class=&quot;fas fa-music&quot;&gt;&lt;/i&gt;'}
                    &lt;/div&gt;
                    &lt;div class=&quot;banner-info&quot;&gt;
                        &lt;div style=&quot;font-size:12px; font-weight:700;&quot;&gt;PLAYLIST&lt;/div&gt;
                        &lt;h1&gt;${meta.name}&lt;/h1&gt;
                        &lt;div style=&quot;color:#d9d9d9;&quot;&gt;${meta.desc} • ${songs.length} songs&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;content-area&quot;&gt;
                     &lt;div class=&quot;play-circle&quot; style=&quot;width:56px; height:56px; background:#1db954; font-size:24px; margin-bottom:24px;&quot; 
                         onclick=&quot;player.playContext(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(songs))}')))&quot;&gt;
                        &lt;i class=&quot;fas fa-play&quot;&gt;&lt;/i&gt;
                    &lt;/div&gt;
                    ${app.generateSongTable(songs)}
                &lt;/div&gt;
            `;
        },

        handleSearch: async (q) =&gt; {
            if(!q) return;
            const grid = document.getElementById('search-grid');
            grid.innerHTML = '&lt;div class=&quot;loader&quot; style=&quot;display:block&quot;&gt;&lt;/div&gt;';
            
            // 1. Search Local DB (for Drive links)
            const localResults = LOCAL_DATABASE.filter(s =&gt; s.title.toLowerCase().includes(q.toLowerCase()) || s.artist.toLowerCase().includes(q.toLowerCase()));
            
            // 2. Search API
            const apiResults = await api.search(q);
            
            // 3. Merge
            const finalResults = [...localResults, ...apiResults];
            
            // Update Global DB for Context
            // We append these to global DB so player can find them if clicked
            finalResults.forEach(r =&gt; {
                if(!CURRENT_DB.find(x =&gt; x.id === r.id)) CURRENT_DB.push(r);
            });

            grid.innerHTML = finalResults.length ? finalResults.map(s =&gt; app.createCardHtml(s)).join('') : '&lt;div style=&quot;color:#aaa&quot;&gt;No results found.&lt;/div&gt;';
        },

        createCardHtml: (s) =&gt; {
            // Encode object for passing to onclick
            const safeObj = encodeURIComponent(JSON.stringify(s));
            return `
                &lt;div class=&quot;card&quot; onclick=&quot;player.playSingle(JSON.parse(decodeURIComponent('${safeObj}')))&quot; oncontextmenu=&quot;data.openCtx(event, '${s.id}', JSON.parse(decodeURIComponent('${safeObj}')))&quot;&gt;
                    &lt;div class=&quot;card-img&quot; style=&quot;background-image:url('${s.cover}')&quot;&gt;
                        &lt;div class=&quot;card-play-btn&quot;&gt;&lt;i class=&quot;fas fa-play&quot;&gt;&lt;/i&gt;&lt;/div&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;card-title&quot;&gt;${s.title}&lt;/div&gt;
                    &lt;div class=&quot;card-desc&quot;&gt;${s.artist}&lt;/div&gt;
                &lt;/div&gt;
            `;
        },

        generateSongTable: (songs) =&gt; {
            return `&lt;table class=&quot;song-table&quot;&gt;
                &lt;thead&gt;&lt;tr&gt;&lt;th style=&quot;width:40px&quot;&gt;#&lt;/th&gt;&lt;th&gt;Title&lt;/th&gt;&lt;th&gt;Album&lt;/th&gt;&lt;th&gt;&lt;i class=&quot;far fa-clock&quot;&gt;&lt;/i&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
                &lt;tbody&gt;
                ${songs.map((s, i) =&gt; {
                    const safeObj = encodeURIComponent(JSON.stringify(s));
                    return `
                    &lt;tr oncontextmenu=&quot;data.openCtx(event, '${s.id}', JSON.parse(decodeURIComponent('${safeObj}')))&quot; ondblclick=&quot;player.playSingle(JSON.parse(decodeURIComponent('${safeObj}')))&quot;&gt;
                        &lt;td&gt;&lt;span class=&quot;row-num&quot;&gt;${i+1}&lt;/span&gt;&lt;i class=&quot;fas fa-play row-play&quot; onclick=&quot;player.playSingle(JSON.parse(decodeURIComponent('${safeObj}')))&quot;&gt;&lt;/i&gt;&lt;/td&gt;
                        &lt;td&gt;
                            &lt;div style=&quot;display:flex; align-items:center; gap:12px;&quot;&gt;
                                &lt;img src=&quot;${s.cover}&quot; style=&quot;width:40px; height:40px;&quot;&gt;
                                &lt;div&gt;&lt;div style=&quot;color:white; font-size:16px;&quot;&gt;${s.title}&lt;/div&gt;&lt;div style=&quot;color:#b3b3b3;&quot;&gt;${s.artist}&lt;/div&gt;&lt;/div&gt;
                            &lt;/div&gt;
                        &lt;/td&gt;
                        &lt;td&gt;${s.album}&lt;/td&gt;
                        &lt;td&gt;
                            &lt;div style=&quot;display:flex; align-items:center; gap:16px;&quot;&gt;
                                &lt;i class=&quot;${state.likedIds.includes(s.id)?'fas':'far'} fa-heart heart-btn&quot; 
                                   data-id=&quot;${s.id}&quot;
                                   style=&quot;color:${state.likedIds.includes(s.id)?'#1db954':'#b3b3b3'}; cursor:pointer;&quot;
                                   onclick=&quot;data.toggleLike('${s.id}', JSON.parse(decodeURIComponent('${safeObj}')))&quot;&gt;&lt;/i&gt;
                                ${s.duration}
                            &lt;/div&gt;
                        &lt;/td&gt;
                    &lt;/tr&gt;
                `}).join('')}
                &lt;/tbody&gt;&lt;/table&gt;`;
        },

        updateRangeColor: (el) =&gt; {
            const val = ((el.value - el.min) / (el.max - el.min)) * 100;
            el.style.backgroundSize = val + '% 100%';
        },

        updateProgress: () =&gt; {
            if(!audio.duration || isNaN(audio.duration)) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            const bar = document.getElementById('seek-bar');
            if(isFinite(pct)) { bar.value = pct; app.updateRangeColor(bar); }

            const fmt = (t) =&gt; {
                if(isNaN(t)) return &quot;0:00&quot;;
                const m = Math.floor(t/60), s = Math.floor(t%60);
                return m + &quot;:&quot; + (s&lt;10?'0':'') + s;
            };
            document.getElementById('time-curr').innerText = fmt(audio.currentTime);
            document.getElementById('time-dur').innerText = fmt(audio.duration);
        }
    };

    /* ================= DATA &amp; UI UTILS ================= */
    const data = {
        save: () =&gt; {
            localStorage.setItem('cinify_playlists', JSON.stringify(state.userPlaylists));
            localStorage.setItem('cinify_liked', JSON.stringify(state.likedIds));
            localStorage.setItem('cinify_cache', JSON.stringify(state.savedSongsCache));
        },

        toggleLike: (id, songObj) =&gt; {
            if(state.likedIds.includes(id)) {
                state.likedIds = state.likedIds.filter(x =&gt; x !== id);
                // We don't remove from cache to keep it simple, or we could check valid refs
            } else {
                state.likedIds.push(id);
                if(songObj) state.savedSongsCache[id] = songObj; // Cache for playlist view
            }
            data.save();
            
            // Visual Updates
            const pbHeart = document.getElementById('pb-heart');
            if(state.queue[state.currentIndex]?.id === id) {
                 pbHeart.className = state.likedIds.includes(id) ? 'fas fa-heart' : 'far fa-heart';
                 pbHeart.style.color = state.likedIds.includes(id) ? '#1db954' : '#b3b3b3';
            }
            document.querySelectorAll(`.heart-btn[data-id=&quot;${id}&quot;]`).forEach(btn =&gt; {
                btn.className = state.likedIds.includes(id) ? 'fas fa-heart heart-btn heart-anim' : 'far fa-heart heart-btn heart-anim';
                btn.style.color = state.likedIds.includes(id) ? '#1db954' : '#b3b3b3';
            });
        },

        openCreateModal: () =&gt; { document.getElementById('modal-overlay').style.display = 'flex'; },
        closeModal: () =&gt; { document.getElementById('modal-overlay').style.display = 'none'; },
        confirmCreatePlaylist: () =&gt; {
            const name = document.getElementById('new-pl-name').value;
            if(name) {
                state.userPlaylists.push({ id: 'pl_'+Date.now(), name: name, songs: [] });
                data.save();
                data.renderSidebar();
                data.closeModal();
            }
        },

        showToast: (msg) =&gt; {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() =&gt; t.classList.remove('show'), 3000);
        },

        renderSidebar: () =&gt; {
            const list = document.getElementById('sidebar-list');
            list.innerHTML = `
                &lt;div class=&quot;pl-row&quot; onclick=&quot;app.nav('liked')&quot;&gt;
                    &lt;div class=&quot;pl-img&quot; style=&quot;background:linear-gradient(135deg, #450af5, #c4efd9); color:white;&quot;&gt;&lt;i class=&quot;fas fa-heart&quot;&gt;&lt;/i&gt;&lt;/div&gt;
                    &lt;div class=&quot;pl-info&quot;&gt;&lt;div class=&quot;pl-name&quot;&gt;Liked Songs&lt;/div&gt;&lt;div class=&quot;pl-sub&quot;&gt;Auto Playlist&lt;/div&gt;&lt;/div&gt;
                &lt;/div&gt;
            ` + state.userPlaylists.map(pl =&gt; `
                &lt;div class=&quot;pl-row&quot; onclick=&quot;app.nav('playlist', '${pl.id}')&quot;&gt;
                    &lt;div class=&quot;pl-img&quot;&gt;&lt;i class=&quot;fas fa-music&quot;&gt;&lt;/i&gt;&lt;/div&gt;
                    &lt;div class=&quot;pl-info&quot;&gt;&lt;div class=&quot;pl-name&quot;&gt;${pl.name}&lt;/div&gt;&lt;div class=&quot;pl-sub&quot;&gt;User Playlist&lt;/div&gt;&lt;/div&gt;
                    &lt;i class=&quot;fas fa-times pl-delete-btn&quot; onclick=&quot;data.deletePlaylist('${pl.id}', event)&quot;&gt;&lt;/i&gt;
                &lt;/div&gt;
            `).join('');
        },

        deletePlaylist: (id, e) =&gt; {
            e.stopPropagation(); 
            if(confirm(&quot;Delete this playlist?&quot;)) {
                state.userPlaylists = state.userPlaylists.filter(p =&gt; p.id !== id);
                data.save();
                data.renderSidebar();
                app.nav('home'); 
            }
        },

        openCtx: (e, id, songObj) =&gt; {
            e.preventDefault();
            state.ctxTarget = id;
            if(songObj) state.savedSongsCache[id] = songObj; // Cache for potential add

            const menu = document.getElementById('context-menu');
            const list = document.getElementById('ctx-pl-list');
            
            list.innerHTML = state.userPlaylists.map(pl =&gt; `
                &lt;div class=&quot;ctx-item&quot; onclick=&quot;data.addToPl('${pl.id}')&quot;&gt;${pl.name}&lt;/div&gt;
            `).join('');

            if(state.userPlaylists.length === 0) list.innerHTML = `&lt;div class=&quot;ctx-item&quot; style=&quot;color:#777;&quot;&gt;No playlists&lt;/div&gt;`;

            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        },

        addToPl: (plId) =&gt; {
            const pl = state.userPlaylists.find(p =&gt; p.id === plId);
            if(pl &amp;&amp; state.ctxTarget) {
                if(!pl.songs.includes(state.ctxTarget)) {
                    pl.songs.push(state.ctxTarget);
                    data.save();
                    data.showToast(&quot;Added to &quot; + pl.name); 
                } else {
                    data.showToast(&quot;Already in playlist&quot;);
                }
            }
            document.getElementById('context-menu').style.display = 'none';
        },

        ctxAddToLiked: () =&gt; {
            if(state.ctxTarget) data.toggleLike(state.ctxTarget, state.savedSongsCache[state.ctxTarget]);
            document.getElementById('context-menu').style.display = 'none';
        }
    };

    /* ================= PLAYER CONTROLLER ================= */
    const player = {
        loadSong: (index, autoPlay=true) =&gt; {
            if(state.queue.length === 0) return;
            // Wrap index
            if(index &gt;= state.queue.length) index = 0;
            if(index &lt; 0) index = state.queue.length - 1;

            state.currentIndex = index;
            const song = state.queue[index];

            // UI Update
            document.getElementById('pb-title').innerText = song.title;
            document.getElementById('pb-artist').innerText = song.artist;
            document.getElementById('pb-art').style.backgroundImage = `url('${song.cover}')`;
            
            // Heart Update
            const h = document.getElementById('pb-heart');
            h.className = state.likedIds.includes(song.id) ? 'fas fa-heart' : 'far fa-heart';
            h.style.color = state.likedIds.includes(song.id) ? '#1db954' : '#b3b3b3';

            // IFRAME VS AUDIO LOGIC
            const stdCtrl = document.getElementById('standard-controls');
            const drvCtrl = document.getElementById('drive-player-container');

            if(song.isDrive) {
                stdCtrl.style.display = 'none';
                drvCtrl.style.display = 'flex';
                drvCtrl.innerHTML = `&lt;iframe id=&quot;drive-iframe&quot; src=&quot;${song.url}&quot; allow=&quot;autoplay&quot;&gt;&lt;/iframe&gt;`;
                audio.pause(); 
                state.isPlaying = false; 
            } else {
                drvCtrl.style.display = 'none';
                drvCtrl.innerHTML = ''; 
                stdCtrl.style.display = 'block';
                
                audio.src = song.url;
                if(autoPlay) {
                    audio.play().catch(e =&gt; console.log(&quot;Auto-play blocked by browser policy&quot;));
                    state.isPlaying = true;
                    player.updatePlayIcon();
                }
            }
        },

        playSingle: (song) =&gt; {
            // Check if song exists in current queue, if not, replace queue or append
            // For simplicity, we make a new queue with just this song mixed with current context?
            // Standard behavior: Play this song, set queue to current context.
            // Since our &quot;Search&quot; doesn't persist context well, we just make a mini queue or find it.
            
            const idx = state.queue.findIndex(s =&gt; s.id === song.id);
            if(idx !== -1) {
                player.loadSong(idx);
            } else {
                // Add to front of queue
                state.queue.splice(state.currentIndex + 1, 0, song);
                player.loadSong(state.currentIndex + 1);
            }
        },

        playContext: (songList) =&gt; {
            if(!songList || songList.length === 0) return;
            state.queue = [...songList];
            player.loadSong(0);
        },

        togglePlay: () =&gt; {
            if(state.queue[state.currentIndex]?.isDrive) return; 
            if(state.isPlaying) audio.pause();
            else audio.play();
            state.isPlaying = !state.isPlaying;
            player.updatePlayIcon();
        },

        updatePlayIcon: () =&gt; {
            const i = document.getElementById('main-play-icon');
            i.className = state.isPlaying ? 'fas fa-pause' : 'fas fa-play';
        },

        next: () =&gt; {
            if(state.shuffle) player.loadSong(Math.floor(Math.random()*state.queue.length));
            else player.loadSong(state.currentIndex + 1);
        },
        
        prev: () =&gt; {
            if(audio.currentTime &gt; 3) audio.currentTime = 0;
            else player.loadSong(state.currentIndex - 1);
        },

        toggleShuffle: () =&gt; {
            state.shuffle = !state.shuffle;
            document.getElementById('btn-shuffle').classList.toggle('active');
        },

        toggleLoop: () =&gt; {
            state.loop = !state.loop;
            document.getElementById('btn-loop').classList.toggle('active');
        },

        onEnded: () =&gt; {
            if(state.loop) { audio.currentTime = 0; audio.play(); }
            else player.next();
        },

        toggleLikeCurrent: () =&gt; {
            const s = state.queue[state.currentIndex];
            if(s) data.toggleLike(s.id, s);
        },

        toggleMute: () =&gt; {
            audio.muted = !audio.muted;
            player.updateVolIcon();
        },

        updateVolIcon: () =&gt; {
            const v = document.getElementById('vol-icon');
            if(audio.muted || audio.volume === 0) v.className = 'fas fa-volume-mute ctrl-btn';
            else if (audio.volume &lt; 0.5) v.className = 'fas fa-volume-down ctrl-btn';
            else v.className = 'fas fa-volume-up ctrl-btn';
        }
    };

    window.app = app;
    window.data = data;
    window.player = player;

    window.onload = app.init;

&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;

                    &lt;div class=&quot;carousel-track&quot; id=&quot;track&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;

                    &lt;div class=&quot;hero-title&quot; id=&quot;hero-title&quot;&gt;Select Item&lt;/div&gt;
