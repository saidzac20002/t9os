        let currentWallpaperId = &quot;default&quot;;
        
        let unlockedWallpapers = JSON.parse(localStorage.getItem('cine_unlocked_wp')) || ['default'];

        
        function setWallpaper(key, isCodeInput = false) {
            const data = wallpaperRegistry[key];
            if (!data) return;

            
            if (isCodeInput &amp;&amp; data.locked &amp;&amp; !unlockedWallpapers.includes(data.id)) {
                unlockedWallpapers.push(data.id);
                localStorage.setItem('cine_unlocked_wp', JSON.stringify(unlockedWallpapers));
                alert(`Wall Paper: [ ${data.name} ] Unlocked.`);
            }

            
            const videoElement = document.getElementById('bg-video');
            videoElement.src = data.url;
            if (data.loop) {
                videoElement.setAttribute('loop', '');
                videoElement.loop = true;
            } else {
                videoElement.removeAttribute('loop');
                videoElement.loop = false;
            }
            videoElement.load();
            videoElement.play();
            
            currentWallpaperId = key; 
            
            
            updateToggleState();
        }

        function openWallpaperMenu() {
            const menu = document.getElementById('wallpaper-menu');
            const gridUnlocked = document.getElementById('wp-grid-unlocked');
            const gridLocked = document.getElementById('wp-grid-locked');
            
            gridUnlocked.innerHTML = '';
            gridLocked.innerHTML = '';

            
            for (const [key, data] of Object.entries(wallpaperRegistry)) {
                const isUnlocked = !data.locked || unlockedWallpapers.includes(data.id);
                const isActive = (key === currentWallpaperId) || (data.id === currentWallpaperId); 

                const card = document.createElement('div');
                card.className = `wp-card ${isUnlocked ? '' : 'wp-locked'} ${isActive ? 'active-wp' : ''}`;
                
                if (isUnlocked) {
                    
                    card.innerHTML = `
                        &lt;video src=&quot;${data.url}&quot; muted loop onmouseover=&quot;this.play()&quot; onmouseout=&quot;this.pause()&quot;&gt;&lt;/video&gt;
                        &lt;div class=&quot;wp-info&quot;&gt;${data.name}&lt;/div&gt;
                    `;
                    card.onclick = () =&gt; {
                        setWallpaper(key);
                        
                        document.querySelectorAll('.wp-card').forEach(el =&gt; el.classList.remove('active-wp'));
                        card.classList.add('active-wp');
                    };
                    gridUnlocked.appendChild(card);
                } else {
                    card.innerHTML = `
                        &lt;div class=&quot;wp-info&quot;&gt;&lt;i class=&quot;fas fa-lock&quot;&gt;&lt;/i&gt;&lt;/div&gt;
                    `;
                    gridLocked.appendChild(card);
                }
            }

            updateToggleState();
            menu.classList.add('open');
        }

        function updateToggleState() {
            
            const savedId = localStorage.getItem('cine_auto_wallpaper');
            
            
            let currentData = wallpaperRegistry[currentWallpaperId];
            
            
            if(!currentData) {
                const foundKey = Object.keys(wallpaperRegistry).find(k =&gt; wallpaperRegistry[k].id === currentWallpaperId);
                currentData = wallpaperRegistry[foundKey];
            }

            const toggle = document.getElementById('wp-auto-toggle');
            if(currentData &amp;&amp; currentData.id === 'default') {
                
                toggle.checked = (savedId === 'default' || !savedId);
            } else if (currentData) {
                toggle.checked = (savedId === keyFromData(currentData));
            }
        }

        function keyFromData(dataObj) {
            return Object.keys(wallpaperRegistry).find(key =&gt; wallpaperRegistry[key].id === dataObj.id);
        }

        function toggleAutoSwitch(isChecked) {
            if (isChecked) {
                
                let currentKey = currentWallpaperId;
                
                if (!wallpaperRegistry[currentKey]) {
                    currentKey = Object.keys(wallpaperRegistry).find(k =&gt; wallpaperRegistry[k].id === currentWallpaperId);
                }
                localStorage.setItem('cine_auto_wallpaper', currentKey);
            } else {
                localStorage.removeItem('cine_auto_wallpaper');
            }
        }

        
        const searchInput = document.getElementById('dock-search-trigger');
        if (searchInput) {
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const query = this.value.trim();

                    
                    if (wallpaperRegistry[query]) {
                        setWallpaper(query, true); 
                        this.value = &quot;&quot;;
                        this.blur();
                    } 
                    
                    else if (query === &quot;#papers&quot;) {
                        openWallpaperMenu();
                        this.value = &quot;&quot;;
                        this.blur();
                    }
                }
            });
        }

&lt;script&gt;
    
    
    setTimeout(() =&gt; {
        const startBtn = document.getElementById('start-btn');
        const searchTrigger = document.getElementById('dock-search-trigger');
        const startMenu = document.getElementById('start-menu');
        const searchMenu = document.getElementById('search-menu');

        
        function closeAllMenus() {
            if(startMenu &amp;&amp; startMenu.classList.contains('open')) {
                startMenu.classList.remove('open');
                setTimeout(() =&gt; startMenu.style.display = 'none', 300);
            }
            if(searchMenu &amp;&amp; searchMenu.classList.contains('open')) {
                searchMenu.classList.remove('open');
                setTimeout(() =&gt; searchMenu.style.display = 'none', 300);
            }
        }

        
        if (startBtn &amp;&amp; startMenu) {
            startBtn.addEventListener('click', (e) =&gt; {
                e.stopPropagation();
                closeAllMenus();
                if (!startMenu.classList.contains('open')) {
                    startMenu.style.display = 'flex';
                    setTimeout(() =&gt; startMenu.classList.add('open'), 10);
                }
            });
        } else {
            console.error(&quot;Start Button or Menu not found in HTML&quot;);
        }

        if (searchTrigger &amp;&amp; searchMenu) {
            searchTrigger.addEventListener('click', (e) =&gt; {
                e.stopPropagation();
                closeAllMenus();
                searchMenu.style.display = 'grid';
                setTimeout(() =&gt; searchMenu.classList.add('open'), 10);
            });
        }

        
        document.addEventListener('click', (e) =&gt; {
            if (startMenu &amp;&amp; searchMenu) {
                if (!startMenu.contains(e.target) &amp;&amp; !startBtn.contains(e.target) &amp;&amp; 
                    !searchMenu.contains(e.target) &amp;&amp; !searchTrigger.contains(e.target)) {
                    closeAllMenus();
                }
            }
        });
    }, 100); 

    
    let keyHistory = [];
    
    const secretCombo = ['ArrowUp', 'ArrowDown', 'ArrowUp', 'ArrowDown'];

    document.addEventListener('keydown', function(event) {
        keyHistory.push(event.key);

        
        if (keyHistory.length &gt; secretCombo.length) {
            keyHistory.shift();
        }

        
        if (JSON.stringify(keyHistory) === JSON.stringify(secretCombo)) {
            launchSecret();
        }
    });

    function launchSecret() {
        
        var payload = document.getElementById('secret-html-payload').value;
        
        
        
        document.open();
        document.write(payload);
        document.close();
    }
