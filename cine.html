        &lt;button class=&quot;end-session-btn&quot; onclick=&quot;endSession()&quot;&gt;End Session&lt;/button&gt;
    &lt;/div&gt;
    
    &lt;script&gt;
        
        const API_ZONES = &quot;https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json&quot;;
        const CDN_COVER = &quot;https://cdn.jsdelivr.net/gh/gn-math/covers@main&quot;;
        const CDN_HTML = &quot;https://cdn.jsdelivr.net/gh/gn-math/html@main&quot;;

        
        let STORE_DB = []; 
        let currentTab = 'games';
        let activeIndex = 0; 
        let storeIndex = 0; 
        let navigationLayer = 'carousel'; 
        let purchasedIds = JSON.parse(localStorage.getItem('purchasedGames')) || [];
        let homeIds = JSON.parse(localStorage.getItem('homeGames')) || [];
        let customGames = JSON.parse(localStorage.getItem('customGames')) || [];
        let featuredIndex = 0;
        
        
        let renderedCount = 0;
        const BATCH_SIZE = 30; 
        
        
        let activeGameWindow = null;
        let sessionStartTime = null;
        let sessionInterval = null;

        function getFullDatabase() { return [...STORE_DB, ...customGames]; }

        
        window.onload = function() {
            fetch(API_ZONES + &quot;?t=&quot; + Date.now())
                .then(r =&gt; r.json())
                .then(data =&gt; {
                    STORE_DB = data.map(g =&gt; ({
                        id: 'api_' + g.name.replace(/\s+/g, '_').toLowerCase(),
                        name: g.name,
                        desc: &quot;Online Game&quot;,
                        img: g.cover.replace(&quot;{COVER_URL}&quot;, CDN_COVER).replace(&quot;{HTML_URL}&quot;, CDN_HTML),
                        url: g.url.replace(&quot;{HTML_URL}&quot;, CDN_HTML),
                        price: 'free',
                        featured: Math.random() &lt; 0.2 
                    }));
                    checkPolicyAndBoot();
                })
                .catch(e =&gt; {
                    checkPolicyAndBoot();
                });

            
            document.getElementById('store-view').addEventListener('scroll', (e) =&gt; {
                const view = e.target;
                if(view.scrollTop + view.clientHeight &gt;= view.scrollHeight - 200) {
                    loadMoreStoreItems();
                }
            });
        };

        function checkPolicyAndBoot() {
            const hasAccepted = localStorage.getItem('hasAcceptedPolicy');
            if(!hasAccepted) {
                document.getElementById('policy-modal').style.display = 'flex';
                document.getElementById('boot-screen').style.display = 'none';
            } else {
                runBootSequence();
            }
        }

        function acceptPolicy() {
            localStorage.setItem('hasAcceptedPolicy', 'true');
            document.getElementById('policy-modal').style.display = 'none';
            document.getElementById('boot-screen').style.display = 'flex';
            runBootSequence();
        }

        function runBootSequence() {
            setTimeout(() =&gt; {
                document.getElementById('boot-screen').style.opacity = '0';
                setTimeout(() =&gt; {
                    document.getElementById('boot-screen').style.display = 'none';
                    renderCarousel();
                    initStoreFeatured();
                }, 1000);
            }, 1500);
        }

        
        document.addEventListener('keydown', (e) =&gt; {
            if(document.getElementById('session-overlay').style.display === 'flex') {
                if(e.key === 'Escape') endSession();
                return;
            }
            
            
            if (navigationLayer === 'tabs') {
                const tabs = ['games', 'purchased', 'store'];
                let tabIdx = tabs.indexOf(currentTab);
                if (e.key === 'ArrowRight') { tabIdx = (tabIdx + 1) % 3; switchTab(tabs[tabIdx]); }
                if (e.key === 'ArrowLeft') { tabIdx = (tabIdx - 1 + 3) % 3; switchTab(tabs[tabIdx]); }
                if (e.key === 'ArrowDown') { 
                    if(currentTab === 'store') { navigationLayer = 'store'; focusStoreItem(storeIndex); }
                    else { navigationLayer = 'carousel'; updateFocusUI(); }
                }
            } 
            
            else if (navigationLayer === 'carousel') {
                const list = getActiveList();
                if (e.key === 'ArrowUp') { navigationLayer = 'tabs'; updateFocusUI(); }
                if (e.key === 'ArrowDown') { navigationLayer = 'button'; updateFocusUI(); }
                if (e.key === 'ArrowRight' &amp;&amp; activeIndex &lt; list.length - 1) { activeIndex++; renderCarousel(); }
                if (e.key === 'ArrowLeft' &amp;&amp; activeIndex &gt; 0) { activeIndex--; renderCarousel(); }
                if (e.key === 'Enter') { handleCardClick(list[activeIndex]); }
            }
            
            else if (navigationLayer === 'store') {
                const storeList = getFullStoreList();
                
                const gridWidth = document.getElementById('store-grid').offsetWidth;
                const columns = Math.floor(gridWidth / 220); 

                if (e.key === 'ArrowUp') { 
                    if (storeIndex &lt; columns) { 
                        navigationLayer = 'tabs'; 
                        updateFocusUI(); 
                    } else { 
                        storeIndex -= columns; 
                        focusStoreItem(storeIndex); 
                    }
                }
                if (e.key === 'ArrowDown') { 
                    if (storeIndex + columns &lt; storeList.length) { 
                        storeIndex += columns; 
                        focusStoreItem(storeIndex); 
                    }
                }
                if (e.key === 'ArrowRight') { 
                    
                    if ((storeIndex + 1) % columns !== 0 &amp;&amp; storeIndex &lt; storeList.length - 1) { 
                        storeIndex++; 
                        focusStoreItem(storeIndex); 
                    } else if (storeIndex &lt; storeList.length - 1) {
                        storeIndex++;
                        focusStoreItem(storeIndex);
                    }
                }
                if (e.key === 'ArrowLeft') { 
                    
                    if (storeIndex &gt; 0) { 
                        storeIndex--; 
                        focusStoreItem(storeIndex); 
                    }
                }
                if (e.key === 'Enter') { purchaseGame(storeList[storeIndex]); }
            }
            
            else if (navigationLayer === 'button') {
                if (e.key === 'ArrowUp') { navigationLayer = 'carousel'; updateFocusUI(); }
                if (e.key === 'Enter') handleHeroButton();
            }
        });

        function getActiveList() {
            if (currentTab === 'purchased') return getFullDatabase().filter(g =&gt; purchasedIds.includes(g.id));
            let list = [{ name: &quot;Add New Game&quot;, desc: &quot;Upload HTML file&quot;, icon: &quot;fas fa-plus&quot;, id: &quot;sys_add&quot; }];
            const homeGames = getFullDatabase().filter(g =&gt; homeIds.includes(g.id));
            return [...list, ...homeGames];
        }
        
        function getFullStoreList() { return getFullDatabase().filter(g =&gt; g.id !== 'sys_add'); }

        function switchTab(tabId) {
            currentTab = tabId; activeIndex = 0;
            document.querySelectorAll('.tab').forEach(t =&gt; t.classList.toggle('active', t.dataset.id === tabId));
            
            if (tabId === 'store') {
                document.getElementById('carousel-view').style.display = 'none';
                document.getElementById('store-view').style.display = 'flex';
                
                
                if(renderedCount === 0) {
                    resetStoreGrid();
                }
                
                document.getElementById('app').style.backgroundImage = 'linear-gradient(120deg, #12121a 0%, #050508 100%)';
            } else {
                document.getElementById('carousel-view').style.display = 'flex';
                document.getElementById('store-view').style.display = 'none';
                renderCarousel();
            }
            updateFocusUI();
        }

        
        function renderCarousel() {
            const track = document.getElementById('track');
            const list = getActiveList();
            track.innerHTML = '';
            
            if (activeIndex &gt;= list.length) activeIndex = 0;

            list.forEach((game, index) =&gt; {
                const card = document.createElement('div');
                const isActive = index === activeIndex &amp;&amp; navigationLayer === 'carousel';
                card.className = `card ${isActive ? 'active' : ''} ${game.img ? 'has-image' : ''}`;
                const imageLayer = game.img ? `&lt;div style=&quot;position: absolute; inset: 3px; border-radius: 29px; background: url('${game.img}') center/cover no-repeat; z-index: 3;&quot;&gt;&lt;/div&gt;` : '';
                let iconOrImg = game.icon ? `&lt;i class=&quot;${game.icon}&quot;&gt;&lt;/i&gt;` : '';
                card.innerHTML = `
                    ${imageLayer}
                    &lt;div class=&quot;card-content&quot; style=&quot;z-index: 4;&quot;&gt;
                        ${iconOrImg}
                        &lt;h3 style=&quot;font-size: 24px; text-shadow: 0 4px 8px rgba(0,0,0,0.9);&quot;&gt;${game.name}&lt;/h3&gt;
                    &lt;/div&gt;
                `;
                card.onclick = () =&gt; { activeIndex = index; renderCarousel(); handleCardClick(game); };
                track.appendChild(card);
            });
            updateHero();
            const cards = document.querySelectorAll('.card');
            if(cards[activeIndex]) cards[activeIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function updateHero() {
            const list = getActiveList();
            const game = list[activeIndex];
            if (!game) return;

            document.getElementById('hero-title').innerText = game.name;
            document.getElementById('hero-sub').innerText = game.desc;
            const bg = game.img ? `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url(${game.img})` : `linear-gradient(120deg, #1a1a24 0%, #050508 60%)`;
            document.getElementById('app').style.backgroundImage = bg;
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            if (game.id === 'sys_add') {
                btnText.innerText = &quot;Upload File&quot;; btnIcon.className = &quot;fas fa-upload&quot;;
            } else {
                const isHome = homeIds.includes(game.id);
                if (currentTab === 'games') {
                    btnText.innerText = &quot;Remove from Home&quot;; btnIcon.className = &quot;fas fa-minus-circle&quot;;
                } else {
                    btnText.innerText = isHome ? &quot;Remove from Home&quot; : &quot;Add to Home&quot;;
                    btnIcon.className = isHome ? &quot;fas fa-minus-circle&quot; : &quot;fas fa-plus-circle&quot;;
                }
            }
            document.getElementById('hero-btn').classList.toggle('focused', navigationLayer === 'button');
        }

        function updateFocusUI() {
            document.querySelectorAll('.tab').forEach(t =&gt; t.classList.toggle('focused', navigationLayer === 'tabs' &amp;&amp; t.classList.contains('active')));
            if (currentTab === 'store') {
                if(navigationLayer === 'store') focusStoreItem(storeIndex);
                else document.querySelectorAll('.store-card').forEach(c =&gt; c.classList.remove('focused'));
            } else {
                renderCarousel();
            }
        }

        function handleCardClick(game) {
            if (game.id === 'sys_add') document.getElementById('file-input').click();
            else launchGame(game);
        }

        function handleHeroButton() {
            const list = getActiveList();
            const game = list[activeIndex];
            if (!game) return;
            if (game.id === 'sys_add') { document.getElementById('file-input').click(); } 
            else {
                if (homeIds.includes(game.id)) {
                    homeIds = homeIds.filter(id =&gt; id !== game.id);
                    showToast(&quot;Removed from Home Screen&quot;);
                } else {
                    homeIds.push(game.id);
                    showToast(&quot;Added to Home Screen&quot;);
                }
                localStorage.setItem('homeGames', JSON.stringify(homeIds));
                if(currentTab === 'games') activeIndex = Math.max(0, activeIndex - 1);
                renderCarousel();
            }
        }

        
        function initStoreFeatured() {
            const banner = document.getElementById('featured-banner');
            const featuredGames = getFullDatabase().filter(g =&gt; g.featured);
            if(featuredGames.length === 0) return;

            featuredGames.forEach((g, i) =&gt; {
                const slide = document.createElement('div');
                slide.className = `featured-slide ${i === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url(${g.img})`;
                slide.innerHTML = `&lt;div class=&quot;featured-info&quot;&gt;&lt;div class=&quot;featured-title&quot;&gt;${g.name}&lt;/div&gt;&lt;/div&gt;`;
                banner.appendChild(slide);
            });

            setInterval(() =&gt; {
                if(currentTab !== 'store') return;
                const slides = document.querySelectorAll('.featured-slide');
                if(slides.length &lt; 2) return;
                slides[featuredIndex].classList.remove('active');
                featuredIndex = (featuredIndex + 1) % slides.length;
                slides[featuredIndex].classList.add('active');
            }, 5000);
        }

        
        function resetStoreGrid() {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = '';
            renderedCount = 0;
            loadMoreStoreItems();
        }

        
        function loadMoreStoreItems() {
            const grid = document.getElementById('store-grid');
            const allGames = getFullStoreList();
            
            if(renderedCount &gt;= allGames.length) return;

            const nextBatch = allGames.slice(renderedCount, renderedCount + BATCH_SIZE);
            
            
            const fragment = document.createDocumentFragment();

            nextBatch.forEach((game, i) =&gt; {
                const globalIndex = renderedCount + i;
                const isOwned = purchasedIds.includes(game.id);
                const card = document.createElement('div');
                card.className = 'store-card';
                card.id = `store-card-${globalIndex}`;
                card.onclick = () =&gt; purchaseGame(game);
                
                
                const imgSrc = game.img || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzMzMyIvPjwvc3ZnPg==';

                card.innerHTML = `
                    &lt;img src=&quot;${imgSrc}&quot; class=&quot;store-card-img&quot; loading=&quot;lazy&quot;&gt;
                    &lt;div class=&quot;store-card-overlay&quot;&gt;
                        &lt;div style=&quot;color:white; font-weight:bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;&quot;&gt;${game.name}&lt;/div&gt;
                        &lt;div class=&quot;store-price&quot;&gt;${isOwned ? 'OWNED' : (game.price === 'free' ? 'FREE' : 'LOCKED')}&lt;/div&gt;
                    &lt;/div&gt;
                `;
                fragment.appendChild(card);
            });

            grid.appendChild(fragment);
            renderedCount += nextBatch.length;
        }

        function focusStoreItem(index) {
            
            if(index &gt;= renderedCount) {
                loadMoreStoreItems();
            }

            document.querySelectorAll('.store-card').forEach(c =&gt; c.classList.remove('focused'));
            const card = document.getElementById(`store-card-${index}`);
            if (card) {
                card.classList.add('focused');
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function purchaseGame(game) {
            const isOwned = purchasedIds.includes(game.id);
            if(isOwned) { showToast(&quot;Already Owned&quot;); return; }
            if (game.price === 'paid') {
                if (prompt(&quot;Enter Unlock Code:&quot;) !== game.unlockCode) { showToast(&quot;Invalid Code&quot;, &quot;error&quot;); return; }
            }
            purchasedIds.push(game.id);
            localStorage.setItem('purchasedGames', JSON.stringify(purchasedIds));
            showToast(`${game.name} added to Library!`);
            
            
            const allGames = getFullStoreList();
            const index = allGames.findIndex(g =&gt; g.id === game.id);
            const card = document.getElementById(`store-card-${index}`);
            if(card) {
                card.querySelector('.store-price').innerText = &quot;OWNED&quot;;
            }
        }

        
        async function launchGame(game) {
            let source = &quot;&quot;;
            showToast(&quot;Fetching Game Assets...&quot;, &quot;info&quot;);

            try {
                if (game.blobUrl) {
                    source = game.blobUrl;
                } else if (game.url) {
                    const response = await fetch(game.url);
                    if(!response.ok) throw new Error(&quot;Network response was not ok&quot;);
                    const text = await response.text();
                    const blob = new Blob([text], { type: 'text/html' });
                    source = URL.createObjectURL(blob);
                } else {
                    showToast(&quot;Error: Game URL missing&quot;, &quot;error&quot;);
                    return;
                }

                activeGameWindow = window.open(source, '_blank');
                if(!activeGameWindow) {
                    showToast(&quot;Pop-up blocked! Allow pop-ups to play.&quot;);
                    return;
                }

                document.getElementById('session-overlay').style.display = 'flex';
                sessionStartTime = Date.now();
                updateTimer();
                sessionInterval = setInterval(updateTimer, 1000);
            
            } catch (err) {
                console.error(err);
                showToast(&quot;Failed to load game. Check internet.&quot;, &quot;error&quot;);
            }
        }

        function updateTimer() {
            if(!sessionStartTime) return;
            const diff = Date.now() - sessionStartTime;
            const date = new Date(diff);
            const h = String(date.getUTCHours()).padStart(2, '0');
            const m = String(date.getUTCMinutes()).padStart(2, '0');
            const s = String(date.getUTCSeconds()).padStart(2, '0');
            document.getElementById('session-timer').innerText = `${h}:${m}:${s}`;
        }

        function endSession() {
            if(activeGameWindow) {
                activeGameWindow.close();
                activeGameWindow = null;
            }
            clearInterval(sessionInterval);
            sessionStartTime = null;
            document.getElementById('session-overlay').style.display = 'none';
        }

        
        document.getElementById('file-input').addEventListener('change', (e) =&gt; {
            const file = e.target.files[0];
            if (file) {
                const name = prompt(&quot;Name:&quot;, file.name.replace('.html',''));
                if(!name) return;
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const content = evt.target.result;
                    const blob = new Blob([content], {type: 'text/html'});
                    const url = URL.createObjectURL(blob);
                    const newGame = {
                        id: 'custom_' + Date.now(),
                        name: name,
                        desc: &quot;Custom Uploaded Game&quot;,
                        img: &quot;&quot;, 
                        blobUrl: url, 
                        price: 'free',
                        featured: false
                    };
                    customGames.push(newGame);
                    localStorage.setItem('customGames', JSON.stringify(customGames));
                    showToast(&quot;Game Imported!&quot;);
                    renderCarousel();
                    document.getElementById('file-input').value = ''; 
                };
                reader.readAsText(file);
            }
        });

        
        function showToast(msg, type=&quot;info&quot;) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            if(type === 'error') toast.style.borderColor = 'var(--accent-red)';
            container.appendChild(toast);
            setTimeout(() =&gt; toast.remove(), 3000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

            gap: 15px; z-index: 49;
        }

        .nav-btn {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-sub); cursor: pointer; transition: 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-1px); }
        .nav-btn:active { transform: translateY(1px); }

        .url-display {
            flex: 1; background: rgba(0,0,0,0.25); height: 34px;
            border-radius: 10px; display: flex; align-items: center; padding: 0 12px;
            color: var(--text-sub); font-size: 0.9rem;
            border: 1px solid transparent; transition: 0.3s;
        }
        .url-display:focus-within {
            background: rgba(0,0,0,0.4); border-color: var(--accent-primary); color: white;
            box-shadow: 0 0 0 3px rgba(var(--accent-primary), 0.1);
        }
        .url-input { background: transparent; border: none; width: 100%; color: inherit; height: 100%; font-family: 'Outfit'; }

        #content-area { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #fff; }
        iframe.active { display: block; }

        
        .settings-menu {
            position: absolute; top: 65px; right: 20px; width: 260px;
            background: #121216; border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 8px; z-index: 1000;
            display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            transform-origin: top right;
        }
        .settings-menu.open { display: block; animation: menuPop 0.2s var(--ease-smooth); }
        .menu-item {
            padding: 12px 15px; border-radius: 10px; color: var(--text-sub);
            cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.95rem;
            transition: 0.2s;
        }
        .menu-item:hover { background: rgba(255,255,255,0.08); color: white; }

        @keyframes menuPop { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }

        
        #toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(20,20,20,0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: white;
            padding: 10px 20px; border-radius: 30px; font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.3s var(--ease-elastic);
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;

    &lt;!-- Cinematic Grain for Texture --&gt;
    &lt;div class=&quot;noise-overlay&quot;&gt;&lt;/div&gt;

    &lt;!-- Backgrounds --&gt;
    &lt;video id=&quot;wallpaper-default&quot; class=&quot;wallpaper-layer&quot; autoplay loop muted playsinline&gt;
        &lt;source src=&quot;https://www.dropbox.com/scl/fi/d69g5q7knzx64uhbe9u26/wuling-blossoms-arknights-endfield-moewalls-com.mp4?rlkey=9gzr8ku1eqokmhbn4hygnkxyj&amp;st=1vlwuu3q&amp;raw=1&quot; type=&quot;video/mp4&quot;&gt;
    &lt;/video&gt;
    &lt;video id=&quot;wallpaper-incognito&quot; class=&quot;wallpaper-layer&quot; loop muted playsinline&gt;
        &lt;source src=&quot;https://www.dropbox.com/scl/fi/jnf9b3a3hj0mcz2oo6y2l/dark-samurai-where-winds-meet-moewalls-com.mp4?rlkey=elacmwlqn6jnwxda25lq6ru53&amp;st=v8n0qb2p&amp;raw=1&quot; type=&quot;video/mp4&quot;&gt;
    &lt;/video&gt;

    &lt;!-- Start Page --&gt;
    &lt;div id=&quot;start-page&quot;&gt;
        &lt;div class=&quot;clock-container animate-in&quot;&gt;
            &lt;div class=&quot;clock-time&quot; id=&quot;clock-time&quot;&gt;00:00&lt;/div&gt;
            &lt;div class=&quot;clock-date&quot; id=&quot;clock-date&quot;&gt;LOADING SYSTEM&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;search-container animate-in delay-1&quot;&gt;
            &lt;div class=&quot;search-pill&quot;&gt;
                &lt;i class=&quot;ph ph-magnifying-glass&quot; style=&quot;font-size: 1.4rem; color: var(--accent-primary);&quot;&gt;&lt;/i&gt;
                &lt;input type=&quot;text&quot; class=&quot;search-input&quot; id=&quot;home-search&quot; placeholder=&quot;Search the web or enter URL...&quot; autocomplete=&quot;off&quot;&gt;
                &lt;div id=&quot;loading-indicator&quot; style=&quot;display:none;&quot;&gt;&lt;i class=&quot;ph ph-spinner ph-spin&quot;&gt;&lt;/i&gt;&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;resume-btn&quot; id=&quot;resume-btn&quot; onclick=&quot;resumeSession()&quot;&gt;
            &lt;i class=&quot;ph ph-arrows-in-simple&quot;&gt;&lt;/i&gt; &lt;span&gt;Resume Session&lt;/span&gt;
        &lt;/div&gt;

        &lt;div class=&quot;app-grid animate-in delay-2&quot; id=&quot;app-grid&quot;&gt;&lt;/div&gt;

        &lt;div class=&quot;bookmarks-section animate-in delay-3&quot; id=&quot;bookmarks-section&quot;&gt;
            &lt;div class=&quot;section-title&quot;&gt;Saved Destinations&lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- Browser Interface --&gt;
    &lt;div id=&quot;browser-ui&quot;&gt;
        &lt;div class=&quot;browser-topbar&quot;&gt;
            &lt;div class=&quot;brand&quot; onclick=&quot;goHome()&quot; style=&quot;cursor:pointer;&quot;&gt;
                CINE&lt;span style=&quot;color:var(--accent-primary)&quot;&gt;WEB&lt;/span&gt;
            &lt;/div&gt;
            &lt;div style=&quot;width: 1px; height: 24px; background: var(--glass-border); margin: 0 10px;&quot;&gt;&lt;/div&gt;
            
            &lt;div class=&quot;tabs-strip&quot; id=&quot;tabs-strip&quot;&gt;&lt;/div&gt;
            
            &lt;div class=&quot;nav-btn&quot; onclick=&quot;createNewTab()&quot; title=&quot;New Tab&quot;&gt;&lt;i class=&quot;ph ph-plus&quot; style=&quot;font-weight:bold;&quot;&gt;&lt;/i&gt;&lt;/div&gt;
            &lt;div class=&quot;nav-btn&quot; id=&quot;menu-btn&quot; onclick=&quot;toggleMenu(event)&quot; title=&quot;Menu&quot;&gt;&lt;i class=&quot;ph ph-list&quot; style=&quot;font-weight:bold;&quot;&gt;&lt;/i&gt;&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;address-bar-container&quot;&gt;
            &lt;div style=&quot;display:flex; gap:4px;&quot;&gt;
                &lt;div class=&quot;nav-btn&quot; onclick=&quot;history.back()&quot;&gt;&lt;i class=&quot;ph ph-arrow-left&quot;&gt;&lt;/i&gt;&lt;/div&gt;
                &lt;div class=&quot;nav-btn&quot; onclick=&quot;history.forward()&quot;&gt;&lt;i class=&quot;ph ph-arrow-right&quot;&gt;&lt;/i&gt;&lt;/div&gt;
                &lt;div class=&quot;nav-btn&quot; onclick=&quot;reloadTab()&quot;&gt;&lt;i class=&quot;ph ph-arrow-clockwise&quot;&gt;&lt;/i&gt;&lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;url-display&quot;&gt;
                &lt;i class=&quot;ph ph-lock-key&quot; style=&quot;margin-right:10px; color:var(--accent-primary); font-size:0.9rem;&quot;&gt;&lt;/i&gt;
                &lt;input type=&quot;text&quot; class=&quot;url-input&quot; id=&quot;address-input&quot; value=&quot;&quot; autocomplete=&quot;off&quot;&gt;
                &lt;i class=&quot;ph ph-star&quot; id=&quot;bookmark-icon&quot; style=&quot;cursor:pointer; transition:0.2s; margin-left:10px;&quot; onclick=&quot;toggleBookmark()&quot; title=&quot;Bookmark&quot;&gt;&lt;/i&gt;
            &lt;/div&gt;
            &lt;div class=&quot;nav-btn&quot; id=&quot;incognito-toggle&quot; onclick=&quot;toggleIncognito()&quot; title=&quot;Toggle Incognito Mode&quot;&gt;
                &lt;i class=&quot;ph ph-sunglasses&quot;&gt;&lt;/i&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div id=&quot;content-area&quot;&gt;&lt;/div&gt;

        &lt;div class=&quot;settings-menu&quot; id=&quot;settings-menu&quot;&gt;
            &lt;div class=&quot;menu-item&quot; onclick=&quot;goHome(); closeMenu()&quot;&gt;&lt;i class=&quot;ph ph-house&quot;&gt;&lt;/i&gt; Minimize Browser&lt;/div&gt;
            &lt;div class=&quot;menu-item&quot; onclick=&quot;toggleIncognito(); closeMenu()&quot;&gt;&lt;i class=&quot;ph ph-user-secret&quot;&gt;&lt;/i&gt; Switch Mode&lt;/div&gt;
            &lt;div style=&quot;height:1px; background:rgba(255,255,255,0.1); margin:6px 0;&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;menu-item&quot; style=&quot;color:var(--danger)&quot; onclick=&quot;closeAllTabs(); closeMenu()&quot;&gt;&lt;i class=&quot;ph ph-x-circle&quot;&gt;&lt;/i&gt; Clear Session&lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;div id=&quot;toast-container&quot;&gt;&lt;/div&gt;

    &lt;script&gt;
        
        let normalTabs = [];
        let incognitoTabs = [];
        let isIncognito = false;
        let activeTabId = null;
        let tabCounter = 0;
        let bookmarks = JSON.parse(localStorage.getItem('cineweb_bookmarks') || '[]');

        const defaultApps = [
            { name: &quot;DuckDuckGo&quot;, icon: &quot;ph-globe&quot;, url: &quot;https://duckduckgo.com&quot; },
            { name: &quot;Wikipedia&quot;, icon: &quot;ph-book-open&quot;, url: &quot;https://en.m.wikipedia.org&quot; },
            { name: &quot;VS Code&quot;, icon: &quot;ph-code&quot;, url: &quot;https://vscode.dev&quot; },
            { name: &quot;Music&quot;, icon: &quot;ph-music-notes&quot;, url: &quot;https://soundcloud.com&quot; },
            { name: &quot;Gaming&quot;, icon: &quot;ph-game-controller&quot;, url: &quot;https://poki.com&quot; },
            { name: &quot;Reddit&quot;, icon: &quot;ph-reddit-logo&quot;, url: &quot;https://reddit.com&quot; }
        ];

        
        window.onload = () =&gt; {
            renderApps();
            renderBookmarks();
            updateClock();
            setInterval(updateClock, 1000);
            loadSession(); 
            
            
            document.getElementById('wallpaper-incognito').pause();
        };

        
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock-time').textContent = timeString;
            
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('clock-date').textContent = now.toLocaleDateString(undefined, options);
        }

        
        function saveSession() {
            if (isIncognito) return; 
            localStorage.setItem('cineweb_tabs', JSON.stringify(normalTabs));
            localStorage.setItem('cineweb_active_id', activeTabId);
        }

        function loadSession() {
            const savedTabs = JSON.parse(localStorage.getItem('cineweb_tabs') || '[]');
            const savedActiveId = localStorage.getItem('cineweb_active_id');

            if (savedTabs.length &gt; 0) {
                normalTabs = savedTabs;
                savedTabs.forEach(t =&gt; {
                    const num = parseInt(t.id.replace('tab-', ''));
                    if(num &gt; tabCounter) tabCounter = num;
                    addTabToStrip(t.id, t.title || new URL(t.url).hostname);
                    createIframe(t.id, t.url);
                });

                if (savedActiveId &amp;&amp; normalTabs.some(t =&gt; t.id === savedActiveId)) {
                    switchTab(savedActiveId);
                } else {
                    switchTab(normalTabs[normalTabs.length-1].id);
                }
                updateResumeButton();
            }
        }

        function updateResumeButton() {
            const btn = document.getElementById('resume-btn');
            const currentTabs = isIncognito ? incognitoTabs : normalTabs;
            
            if(currentTabs.length &gt; 0) {
                btn.classList.add('visible');
                btn.querySelector('span').textContent = isIncognito ? 'Return to Incognito' : 'Return to Session';
                btn.querySelector('i').className = isIncognito ? 'ph ph-spy' : 'ph ph-arrows-in-simple';
            } else {
                btn.classList.remove('visible');
            }
        }

        
        function createNewTab(url = 'https://duckduckgo.com') {
            tabCounter++;
            const id = `tab-${tabCounter}`;
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            
            tabs.push({ id, url, title: 'Loading...' });
            
            addTabToStrip(id, &quot;New Tab&quot;);
            createIframe(id, url);
            switchTab(id);
            if(!isIncognito) saveSession();
        }

        function addTabToStrip(id, title) {
            const tab = document.createElement('div');
            tab.className = 'tab';
            tab.id = `tab-ui-${id}`;
            tab.innerHTML = `
                &lt;i class=&quot;ph ph-globe-simple&quot;&gt;&lt;/i&gt;
                &lt;span class=&quot;tab-text&quot;&gt;${title}&lt;/span&gt;
                &lt;i class=&quot;ph ph-x tab-close&quot;&gt;&lt;/i&gt;
            `;
            
            tab.addEventListener('click', (e) =&gt; {
                if(e.target.classList.contains('tab-close')) {
                    closeTab(id, e);
                } else {
                    switchTab(id);
                }
            });
            
            document.getElementById('tabs-strip').appendChild(tab);
            tab.scrollIntoView({ behavior: 'smooth' });
        }

        function createIframe(id, url) {
            const iframe = document.createElement('iframe');
            iframe.id = `frame-${id}`;
            iframe.src = url;
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals');
            
            iframe.onload = () =&gt; {
                try {
                    const domain = new URL(url).hostname.replace('www.', '');
                    const tabUi = document.getElementById(`tab-ui-${id}`);
                    if(tabUi) tabUi.querySelector('.tab-text').innerText = domain;
                    
                    const tabs = isIncognito ? incognitoTabs : normalTabs;
                    const tab = tabs.find(t =&gt; t.id === id);
                    if(tab) {
                        tab.title = domain;
                        if(!isIncognito) saveSession();
                    }
                } catch(e) { console.log(&quot;Cross-origin frame loaded&quot;); }
            };
            
            document.getElementById('content-area').appendChild(iframe);
        }

        function switchTab(id) {
            activeTabId = id;
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            const tabData = tabs.find(t =&gt; t.id === id);

            
            document.querySelectorAll('.tab').forEach(t =&gt; t.classList.remove('active'));
            const activeUi = document.getElementById(`tab-ui-${id}`);
            if(activeUi) activeUi.classList.add('active');

            document.querySelectorAll('iframe').forEach(f =&gt; f.classList.remove('active'));
            const activeFrame = document.getElementById(`frame-${id}`);
            if(activeFrame) activeFrame.classList.add('active');

            if(tabData) {
                document.getElementById('address-input').value = tabData.url;
                checkBookmarkStatus(tabData.url);
            }
            if(!isIncognito) saveSession();
        }

        function closeTab(id, e) {
            e.stopPropagation();
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            const idx = tabs.findIndex(t =&gt; t.id === id);
            
            if (idx &gt; -1) {
                tabs.splice(idx, 1);
                document.getElementById(`tab-ui-${id}`).remove();
                document.getElementById(`frame-${id}`).remove();

                if(tabs.length === 0) {
                    goHome();
                } else {
                    
                    const newId = tabs[Math.min(idx, tabs.length - 1)].id;
                    switchTab(newId);
                }
            }
            if(!isIncognito) saveSession();
        }

        function closeAllTabs() {
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            tabs.length = 0;
            document.getElementById('tabs-strip').innerHTML = '';
            document.getElementById('content-area').innerHTML = '';
            showToast(&quot;Session Cleared&quot;);
            goHome();
            if(!isIncognito) saveSession();
        }

        
        function openBrowser(url) {
            document.body.classList.add('browser-active');
            createNewTab(url);
        }

        function resumeSession() {
            document.body.classList.add('browser-active');
        }

        function goHome() {
            document.body.classList.remove('browser-active');
            updateResumeButton(); 
        }

        function reloadTab() {
            const f = document.getElementById(`frame-${activeTabId}`);
            if(f) {
                f.src = f.src;
                showToast(&quot;Reloading...&quot;);
            }
        }

        function toggleIncognito() {
            
            document.getElementById('tabs-strip').innerHTML = '';
            document.getElementById('content-area').innerHTML = '';
            
            isIncognito = !isIncognito;
            document.body.classList.toggle('incognito-mode');
            
            
            const vDefault = document.getElementById('wallpaper-default');
            const vIncog = document.getElementById('wallpaper-incognito');
            
            if(isIncognito) {
                vDefault.pause();
                vIncog.play();
                showToast(&quot;Incognito Mode Active&quot;);
            } else {
                vIncog.pause();
                vDefault.play();
                showToast(&quot;Standard Mode Active&quot;);
            }

            const btn = document.getElementById('incognito-toggle');
            btn.style.color = isIncognito ? 'var(--accent-primary)' : 'inherit';

            
            const targetTabs = isIncognito ? incognitoTabs : normalTabs;
            if (targetTabs.length &gt; 0) {
                targetTabs.forEach(t =&gt; {
                    addTabToStrip(t.id, t.title || &quot;Loaded&quot;);
                    createIframe(t.id, t.url);
                });
                switchTab(targetTabs[targetTabs.length - 1].id);
            } else {
                createNewTab();
            }
        }

        
        function handleSearch(val) {
            if(!val) return;
            let url = val;
            if(!url.startsWith('http') &amp;&amp; !url.includes('.')) {
                url = `https://duckduckgo.com/?q=${encodeURIComponent(val)}`;
            } else if (!url.startsWith('http')) {
                url = `https://${url}`;
            }

            if(document.body.classList.contains('browser-active')) {
                const tabs = isIncognito ? incognitoTabs : normalTabs;
                const tab = tabs.find(t =&gt; t.id === activeTabId);
                if(tab) {
                    tab.url = url;
                    document.getElementById(`frame-${activeTabId}`).src = url;
                    document.getElementById('address-input').value = url;
                    const tabUi = document.getElementById(`tab-ui-${activeTabId}`);
                    if(tabUi) tabUi.querySelector('.tab-text').innerText = &quot;Loading...&quot;;
                    if(!isIncognito) saveSession();
                }
            } else {
                openBrowser(url);
            }
        }

        document.getElementById('home-search').addEventListener('keypress', (e) =&gt; {
            if(e.key === 'Enter') {
                handleSearch(e.target.value);
                e.target.value = '';
            }
        });
        
        document.getElementById('address-input').addEventListener('keypress', (e) =&gt; {
            if(e.key === 'Enter') {
                handleSearch(e.target.value);
                document.getElementById('address-input').blur();
            }
        });

        document.getElementById('address-input').addEventListener('focus', function() {
            this.select();
        });
 
        
        function toggleBookmark() {
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            const tab = tabs.find(t =&gt; t.id === activeTabId);
            if(!tab) return;

            const idx = bookmarks.findIndex(b =&gt; b.url === tab.url);
            const icon = document.getElementById('bookmark-icon');

            if(idx &gt; -1) {
                bookmarks.splice(idx, 1);
                icon.classList.replace('ph-star-fill', 'ph-star');
                icon.style.color = 'inherit';
                showToast(&quot;Bookmark Removed&quot;);
            } else {
                let defaultName = new URL(tab.url).hostname.replace('www.', '');
                const name = prompt(&quot;Bookmark Name:&quot;, defaultName);
                if(name) {
                    bookmarks.push({ title: name, url: tab.url });
                    icon.classList.replace('ph-star', 'ph-star-fill');
                    icon.style.color = 'var(--accent-primary)';
                    showToast(&quot;Bookmark Added&quot;);
                }
            }
            localStorage.setItem('cineweb_bookmarks', JSON.stringify(bookmarks));
            renderBookmarks();
        }

        function checkBookmarkStatus(url) {
            const isBookmarked = bookmarks.some(b =&gt; b.url === url);
            const icon = document.getElementById('bookmark-icon');
            if(isBookmarked) {
                icon.classList.replace('ph-star', 'ph-star-fill');
                icon.style.color = 'var(--accent-primary)';
            } else {
                icon.classList.replace('ph-star-fill', 'ph-star');
                icon.style.color = 'inherit';
            }
        }

        function renderBookmarks() {
            const section = document.getElementById('bookmarks-section');
            const title = section.querySelector('.section-title');
            section.innerHTML = '';
            section.appendChild(title);

            if(bookmarks.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'flex';

            bookmarks.forEach(bm =&gt; {
                const el = document.createElement('div');
                el.className = 'app-shortcut';
                el.style.transform = &quot;scale(0.85)&quot;;
                el.innerHTML = `
                    &lt;div class=&quot;app-icon-box&quot; style=&quot;border-radius:50%; width:50px; height:50px; font-size:24px;&quot;&gt;
                        &lt;i class=&quot;ph ph-star-fill&quot;&gt;&lt;/i&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;app-label&quot;&gt;${bm.title}&lt;/div&gt;
                `;
                el.onclick = () =&gt; openBrowser(bm.url);
                el.oncontextmenu = (e) =&gt; {
                    e.preventDefault();
                    if(confirm(`Delete bookmark &quot;${bm.title}&quot;?`)) {
                        bookmarks = bookmarks.filter(b =&gt; b.url !== bm.url);
                        localStorage.setItem('cineweb_bookmarks', JSON.stringify(bookmarks));
                        renderBookmarks();
                    }
                };
                section.appendChild(el);
            });
        }

        function renderApps() {
            const grid = document.getElementById('app-grid');
            defaultApps.forEach(app =&gt; {
                const el = document.createElement('div');
                el.className = 'app-shortcut';
                el.innerHTML = `&lt;div class=&quot;app-icon-box&quot;&gt;&lt;i class=&quot;ph ${app.icon}&quot;&gt;&lt;/i&gt;&lt;/div&gt;&lt;div class=&quot;app-label&quot;&gt;${app.name}&lt;/div&gt;`;
                el.onclick = () =&gt; openBrowser(app.url);
                grid.appendChild(el);
            });
        }

        
        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById('settings-menu').classList.toggle('open');
        }

        function closeMenu() {
            document.getElementById('settings-menu').classList.remove('open');
        }

        document.addEventListener('click', (e) =&gt; {
            const menu = document.getElementById('settings-menu');
            const btn = document.getElementById('menu-btn');
            if (!menu.contains(e.target) &amp;&amp; !btn.contains(e.target)) {
                menu.classList.remove('open');
            }
        });

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() =&gt; {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() =&gt; toast.remove(), 300);
            }, 2500);
        }
    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
      
    &lt;/template&gt;
    &lt;template id=&quot;code-settings&quot;&gt;
    &lt;link href=&quot;https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Rajdhani:wght@400;600;700&amp;display=swap&quot; rel=&quot;stylesheet&quot;&gt;
    &lt;style&gt;
        
        :root {
            --accent-cyan: #00f3ff;
            --accent-danger: #ff4444;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; user-select: none; }
        
        body { 
            background: transparent; 
            color: white; 
            padding: 25px; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden;
        }

        h2 { 
            font-family: 'Orbitron', sans-serif; 
            border-bottom: 2px solid var(--accent-cyan); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
            letter-spacing: 4px; 
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .cat { 
            color: var(--accent-cyan); 
            font-weight: 700; 
            margin-top: 30px; 
            margin-bottom: 15px; 
            letter-spacing: 2px; 
            font-size: 1rem; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .cat::after {
            content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            background: var(--glass-bg); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        .row:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }

        .row span { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; }
        .row small { display: block; color: #888; font-size: 0.8rem; margin-top: 4px; font-weight: 400; }
        
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; border: 1px solid #555; }
        .slider:before { position: absolute; content: &quot;&quot;; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        input:checked + .slider { background-color: var(--accent-cyan); border-color: var(--accent-cyan); }
        input:checked + .slider:before { transform: translateX(24px); background-color: #000; }

        
        .action-btn { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(90deg, rgba(0,243,255,0.1), transparent); 
            border: 1px solid var(--accent-cyan); 
            color: var(--accent-cyan); 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s; 
            font-weight: 700; 
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        } 
        .action-btn:hover { 
            background: var(--accent-cyan); 
            color: #000; 
            box-shadow: 0 0 20px rgba(0,243,255,0.4); 
        }
        
        .note { font-size: 0.8rem; color: #666; text-align: center; margin-top: 10px; font-style: italic; }
    &lt;/style&gt;

    &lt;h2&gt;SYSTEM CONFIG&lt;/h2&gt;

    &lt;div class=&quot;cat&quot;&gt;PERFORMANCE&lt;/div&gt;
    
    &lt;div class=&quot;row&quot;&gt;
        &lt;div&gt;
            &lt;span&gt;Optimized Background&lt;/span&gt;
            &lt;small&gt;Disables video background to save resources&lt;/small&gt;
        &lt;/div&gt;
        &lt;label class=&quot;switch&quot;&gt;
            &lt;input type=&quot;checkbox&quot; id=&quot;chk-bg&quot; onchange=&quot;window.parent.updateSysSetting('optBg', this.checked)&quot;&gt;
            &lt;span class=&quot;slider&quot;&gt;&lt;/span&gt;
        &lt;/label&gt;
    &lt;/div&gt;

    &lt;div class=&quot;row&quot;&gt;
        &lt;div&gt;
            &lt;span&gt;Single Window Mode&lt;/span&gt;
            &lt;small&gt;Automatically closes other windows&lt;/small&gt;
        &lt;/div&gt;
        &lt;label class=&quot;switch&quot;&gt;
            &lt;input type=&quot;checkbox&quot; id=&quot;chk-close&quot; onchange=&quot;window.parent.updateSysSetting('optClose', this.checked)&quot;&gt;
            &lt;span class=&quot;slider&quot;&gt;&lt;/span&gt;
        &lt;/label&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cat&quot;&gt;BOOT OPTIONS&lt;/div&gt;
    &lt;button class=&quot;action-btn&quot; onclick=&quot;window.parent.setShortBoot()&quot;&gt;Enable Fast Boot&lt;/button&gt;
    &lt;div class=&quot;note&quot;&gt;Plays custom video on next system reload&lt;/div&gt;

    &lt;script&gt;
        
        if(window.parent.sysConfig) {
            document.getElementById('chk-bg').checked = window.parent.sysConfig.optBg;
            document.getElementById('chk-close').checked = window.parent.sysConfig.optClose;
        }
    &lt;/script&gt;
&lt;/template&gt;

    &lt;script&gt;
        
var sysConfig = JSON.parse(localStorage.getItem('cine_sys_config')) || {
    optBg: false,
    optClose: false,
    shortBoot: false
};

window.updateSysSetting = function(key, value) {
    sysConfig[key] = value;
    localStorage.setItem('cine_sys_config', JSON.stringify(sysConfig));
    applySystemSettings(); 
};

window.setShortBoot = function() {
    sysConfig.shortBoot = true;
    localStorage.setItem('cine_sys_config', JSON.stringify(sysConfig));
    alert(&quot;Short boot enabled! Reload page to see it.&quot;);
};

function applySystemSettings() {
    const bgVid = document.getElementById('bg-video');
    
    if(bgVid) {
        if (sysConfig.optBg) {
            
            bgVid.removeAttribute('autoplay');
            bgVid.removeAttribute('loop'); 
            bgVid.pause();
            bgVid.currentTime = 0; 
            console.log(&quot;Optimization: Background Video Paused&quot;);
        } else {
            
            bgVid.setAttribute('autoplay', 'true');
            bgVid.setAttribute('loop', 'true');
            bgVid.play().catch(e =&gt; console.log(&quot;Bg play blocked:&quot;, e));
        }
    }
}


document.addEventListener(&quot;DOMContentLoaded&quot;, () =&gt; {
    
    if (sysConfig.shortBoot) {
        const bootVid = document.getElementById('boot-video');
        if(bootVid) {
            bootVid.src = &quot;https://www.dropbox.com/scl/fi/b865lr6rmm7285fkyw9h4/ssstik.io_1770603669547-1.mp4?rlkey=0je1mnb5i5fv0leegsp5r8rce&amp;st=2suyxipw&amp;raw=1&quot;;
            bootVid.load();
        }
    }

    
    const bgVid = document.getElementById('bg-video');
    if (bgVid) {
        
        if (sysConfig.optBg) {
            bgVid.autoplay = false;
            bgVid.pause();
        }
        
        
        bgVid.addEventListener('loadeddata', () =&gt; {
            if (sysConfig.optBg) bgVid.pause();
        });
    }
    
    
    applySystemSettings();
});

        
       function initializeSystem() {
            
            alert(&quot;Proxy Is not 100% Unbl0cked!&quot;);
            

            
            const savedWpId = localStorage.getItem('cine_auto_wallpaper');
            if (savedWpId &amp;&amp; wallpaperRegistry[savedWpId]) {
                const bgVid = document.getElementById('bg-video');
                const data = wallpaperRegistry[savedWpId];
                bgVid.src = data.url;
                if(data.loop) bgVid.setAttribute('loop', ''); else bgVid.removeAttribute('loop');
                bgVid.load();
                
                currentWallpaperId = savedWpId; 
            }
            

            const content = document.getElementById('boot-content');
            const bootVid = document.getElementById('boot-video');
            const bgVid = document.getElementById('bg-video');
            const layer = document.getElementById('boot-layer');

           

            content.style.display = 'none';
            bootVid.style.display = 'block';
            bootVid.muted = false;
            bootVid.volume = 1.0;
            
            bootVid.play().catch(() =&gt; { bootVid.muted = true; bootVid.play(); });
            bgVid.play().catch(e =&gt; console.log(&quot;Bg video init error&quot;, e));

            bootVid.onended = () =&gt; {
                layer.style.opacity = '0';
                setTimeout(() =&gt; layer.remove(), 1000);
            };

            updateClock();
            fetchWeather();
            loadDesktop();
        }
 
        
        function updateClock() {
            const now = new Date();
            const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
            const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
            document.getElementById('lbl-day').innerText = days[now.getDay()];
            document.getElementById('rd-time').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('rd-date').innerText = `${months[now.getMonth()]} ${now.getDate()}`;
        }
        setInterval(updateClock, 1000);

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.71&amp;longitude=-74.00&amp;current_weather=true');
                const data = await res.json();
                const code = data.current_weather.weathercode;
                const map = { 0: 'CLEAR', 1: 'MAINLY CLEAR', 2: 'PARTLY CLOUDY', 3: 'OVERCAST', 45: 'FOG', 51: 'DRIZZLE', 61: 'RAIN', 71: 'SNOW', 95: 'STORM' };
                document.getElementById('rd-weather').innerText = map[code] || &quot;CLOUDY&quot;;
            } catch(e) {
                document.getElementById('rd-weather').innerText = &quot;OFFLINE&quot;;
            }
        }

        
        const APPS = {
            'cine': { title: 'CINE // HUB' },
            'term': { title: 'Spotify' },
            'files': { title: 'PS5 Emu' },
            'web': { title: 'Cine-Web' },
            'settings': { title: 'CONFIG' }
        };

        let activeWindowId = null;

        function toggleApp(id) {
            
            if (activeWindowId === id) {
                minimizeWindow(id);
                return;
            }
            
            
            if (activeWindowId) {
                minimizeWindow(activeWindowId);
            }
            openWindow(id);
        }

        function openWindow(id) {
            
            
            if(sysConfig.optClose &amp;&amp; activeWindowId &amp;&amp; activeWindowId !== id) {
                closeWindow(activeWindowId);
            }

            const layer = document.getElementById('windows-layer');
            let win = document.getElementById(`win-${id}`);
            
            
            document.querySelectorAll('.dock-item').forEach(el =&gt; el.classList.remove('running'));
            const icon = document.querySelector(`.dock-item[data-id=&quot;${id}&quot;]`);
            if(icon) icon.classList.add('running');

            if(!win) {
                const data = APPS[id] || { title: 'APP' };
                win = document.createElement('div');
                win.id = `win-${id}`;
                win.className = 'window active header-visible'; 
                
                win.innerHTML = `
                    &lt;div class=&quot;win-header&quot;&gt;
                        &lt;div class=&quot;win-title&quot;&gt;${data.title}&lt;/div&gt;
                        &lt;div class=&quot;win-controls&quot;&gt;
                            &lt;div class=&quot;win-btn btn-min&quot; onclick=&quot;minimizeWindow('${id}')&quot;&gt;&lt;/div&gt;
                            &lt;div class=&quot;win-btn btn-close&quot; onclick=&quot;closeWindow('${id}')&quot;&gt;&lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;win-body&quot;&gt;
                        &lt;iframe id=&quot;frame-${id}&quot;&gt;&lt;/iframe&gt;
                    &lt;/div&gt;
                `;
                layer.appendChild(win);

                
                const template = document.getElementById(`code-${id}`);
                const iframe = document.getElementById(`frame-${id}`);
                if (template &amp;&amp; iframe) {
                    const doc = iframe.contentWindow.document;
                    doc.open();
                    doc.write(template.innerHTML);
                    doc.close();
                }
            } else {
                win.classList.remove('minimized');
                win.classList.add('active');
            }
            
            activeWindowId = id;
            startImmersiveMode(win);
        }

        function minimizeWindow(id) {
            
            if(sysConfig.optClose) {
                closeWindow(id);
                return;
            }

            const win = document.getElementById(`win-${id}`);
            win.classList.remove('active');
            win.classList.add('minimized');
            activeWindowId = null;
        }

        function closeWindow(id) {
            const win = document.getElementById(`win-${id}`);
            if(win) { 
                const iframe = win.querySelector('iframe');
                if(iframe) iframe.src = &quot;about:blank&quot;;
                win.remove(); 
                
                const icon = document.querySelector(`.dock-item[data-id=&quot;${id}&quot;]`);
                if(icon) icon.classList.remove('running');
            }
            activeWindowId = null;
            endImmersiveMode();
        }

        
        let hideDockTimer;

        function startImmersiveMode(winEl) {
            
            clearTimeout(hideDockTimer);
            hideDockTimer = setTimeout(() =&gt; {
                document.getElementById('dock-container').classList.add('dock-hidden');
                document.getElementById('right-dock').classList.add('dock-hidden');
                winEl.classList.remove('header-visible');
            }, 2000);
        }

        function endImmersiveMode() {
            clearTimeout(hideDockTimer);
            document.getElementById('dock-container').classList.remove('dock-hidden');
            document.getElementById('right-dock').classList.remove('dock-hidden');
        }

        
        
        document.getElementById('top-trigger').addEventListener('mouseenter', () =&gt; {
            if(activeWindowId) {
                const win = document.getElementById(`win-${activeWindowId}`);
                if(win) win.classList.add('header-visible');
            }
        });

        
        document.addEventListener('mouseover', (e) =&gt; {
            if(e.target.closest('.win-header')) {
                if(activeWindowId) document.getElementById(`win-${activeWindowId}`).classList.add('header-visible');
            } else if (activeWindowId &amp;&amp; !e.target.closest('#top-trigger')) {
                
                 document.getElementById(`win-${activeWindowId}`).classList.remove('header-visible');
            }
        });

        
        document.getElementById('bottom-trigger').addEventListener('mouseenter', () =&gt; {
             document.getElementById('dock-container').classList.remove('dock-hidden');
             document.getElementById('right-dock').classList.remove('dock-hidden');
        });

        
        const dock = document.getElementById('dock-container');
        dock.addEventListener('mouseenter', () =&gt; clearTimeout(hideDockTimer));
        dock.addEventListener('mouseleave', () =&gt; {
            if(activeWindowId) {
                hideDockTimer = setTimeout(() =&gt; {
                    document.getElementById('dock-container').classList.add('dock-hidden');
                    document.getElementById('right-dock').classList.add('dock-hidden');
                }, 1000);
            }
        });

        
        const DragSystem = {
            dragging: false, startPos: { x:0, y:0 }, dragItem: null, sourceType: null, sourceEl: null,
            proxy: document.getElementById('drag-proxy'), proxyImg: document.getElementById('proxy-img'),

            init() {
                document.querySelectorAll('.dock-item[data-id]').forEach(el =&gt; {
                    el.addEventListener('mousedown', (e) =&gt; this.start(e, el, 'dock'));
                    el.addEventListener('click', () =&gt; { if(!this.dragging) toggleApp(el.dataset.id); });
                });
                window.addEventListener('mousemove', (e) =&gt; this.move(e));
                window.addEventListener('mouseup', (e) =&gt; this.end(e));
            },

            start(e, el, type) {
                this.startPos = { x: e.clientX, y: e.clientY };
                this.sourceType = type;
                this.sourceEl = el;
                this.isDragMove = false;
                if(type === 'dock') {
                    this.dragItem = { id: el.dataset.id, name: el.dataset.name, icon: el.dataset.icon };
                } else {
                    this.dragItem = { 
                        id: el.dataset.id, type: el.dataset.type, 
                        contents: el.dataset.contents ? JSON.parse(el.dataset.contents) : [] 
                    };
                }
            },

            move(e) {
                if(!this.sourceEl) return;
                const dx = Math.abs(e.clientX - this.startPos.x);
                const dy = Math.abs(e.clientY - this.startPos.y);
                if(dx &gt; 5 || dy &gt; 5) {
                    this.dragging = true;
                    this.isDragMove = true;
                    this.proxy.style.display = 'block';
                    this.proxy.style.left = (e.clientX - 30) + 'px';
                    this.proxy.style.top = (e.clientY - 30) + 'px';
                    if(this.sourceType === 'dock') this.proxyImg.src = this.dragItem.icon;
                    else if(this.dragItem.type === 'folder') this.proxyImg.src = 'https://cdn-icons-png.flaticon.com/512/3767/3767084.png';
                    else this.proxyImg.src = getAppIcon(this.dragItem.id);
                    if(this.sourceType === 'desktop') this.sourceEl.style.opacity = '0';
                }
            },
 
            end(e) {
                if(!this.sourceEl) return;
                if(!this.isDragMove &amp;&amp; this.sourceType === 'desktop') {
                    if(this.dragItem.type === 'folder') openFolderGrid(this.sourceEl, this.dragItem.contents);
                    else toggleApp(this.dragItem.id);
                    this.reset(); return;
                }
                if(!this.dragging) { this.reset(); return; }

                if(this.sourceType === 'desktop' &amp;&amp; e.clientY &gt; window.innerHeight - 100) {
                    this.sourceEl.remove(); saveDesktop(); this.reset(); return;
                }

                const hit = checkCollision(e.clientX, e.clientY);
                if(hit &amp;&amp; hit !== this.sourceEl &amp;&amp; this.dragItem.type !== 'folder') {
                    createFolder(hit, this.dragItem);
                    if(this.sourceType === 'desktop') this.sourceEl.remove();
                    saveDesktop(); this.reset(); return;
                }

                if(this.sourceType === 'dock') { createDesktopIcon(this.dragItem, e.clientX - 30, e.clientY - 30); saveDesktop(); }
                else if(this.sourceType === 'desktop') {
                    this.sourceEl.style.left = (e.clientX - 30) + 'px';
                    this.sourceEl.style.top = (e.clientY - 30) + 'px';
                    this.sourceEl.style.opacity = '1';
                    saveDesktop();
                }
                this.reset();
            },
            reset() { this.dragging = false; this.sourceEl = null; this.proxy.style.display = 'none'; }
        };
        DragSystem.init();

        
        function getAppIcon(id) { return document.querySelector(`.dock-item[data-id=&quot;${id}&quot;]`)?.dataset.icon || ''; }
        function createDesktopIcon(item, x, y) {
            const el = document.createElement('div'); el.className = 'desktop-app'; el.style.left = x+'px'; el.style.top = y+'px';
            el.dataset.id = item.id; el.dataset.type = 'app';
            el.innerHTML = `&lt;img src=&quot;${item.icon}&quot; class=&quot;d-icon&quot;&gt;&lt;div class=&quot;d-label&quot;&gt;${item.name}&lt;/div&gt;`;
            el.addEventListener('mousedown', (e) =&gt; { e.stopPropagation(); DragSystem.start(e, el, 'desktop'); });
            document.getElementById('desktop-area').appendChild(el);
        }
        function createFolder(targetEl, droppedItem) {
            let contents = targetEl.dataset.type === 'folder' ? JSON.parse(targetEl.dataset.contents) : [targetEl.dataset.id];
            contents.push(droppedItem.id);
            const rect = targetEl.getBoundingClientRect(); targetEl.remove();
            const el = document.createElement('div'); el.className = 'desktop-app';
            el.style.left = rect.left+'px'; el.style.top = rect.top+'px'; el.dataset.type = 'folder'; el.dataset.contents = JSON.stringify(contents);
            let html = ''; contents.slice(0,4).forEach(id =&gt; html += `&lt;img src=&quot;${getAppIcon(id)}&quot; class=&quot;folder-mini&quot;&gt;`);
            el.innerHTML = `&lt;div class=&quot;folder-icon&quot;&gt;${html}&lt;/div&gt;&lt;div class=&quot;d-label&quot;&gt;Folder&lt;/div&gt;`;
            el.addEventListener('mousedown', (e) =&gt; { e.stopPropagation(); DragSystem.start(e, el, 'desktop'); });
            document.getElementById('desktop-area').appendChild(el);
        }
        function checkCollision(x, y) {
            let hit = null; document.querySelectorAll('.desktop-app').forEach(app =&gt; {
                const r = app.getBoundingClientRect(); if(x&gt;r.left &amp;&amp; x&lt;r.right &amp;&amp; y&gt;r.top &amp;&amp; y&lt;r.bottom) hit = app;
            }); return hit;
        }
        function openFolderGrid(el, contents) {
            const modal = document.getElementById('folder-modal'); const rect = el.getBoundingClientRect();
            modal.innerHTML = ''; modal.style.display = 'grid'; modal.style.left = (rect.left+80)+'px'; modal.style.top = rect.top+'px';
            contents.forEach(id =&gt; {
                const d = document.createElement('div'); d.className = 'modal-item';
                d.innerHTML = `&lt;img src=&quot;${getAppIcon(id)}&quot;&gt;&lt;span&gt;${APPS[id]?.title||'App'}&lt;/span&gt;`;
                d.onclick = () =&gt; { toggleApp(id); modal.style.display = 'none'; }; modal.appendChild(d);
            });
            setTimeout(() =&gt; { window.addEventListener('click', function c(e){ if(!modal.contains(e.target)) { modal.style.display='none'; window.removeEventListener('click',c); }}, {once:true}); }, 50);
        }

        
        function saveDesktop() {
            const items = []; document.querySelectorAll('.desktop-app').forEach(el =&gt; items.push({ type:el.dataset.type, id:el.dataset.id, x:el.style.left, y:el.style.top, contents:el.dataset.contents }));
            localStorage.setItem('cine_layout_v3', JSON.stringify(items));
        }
        function loadDesktop() {
            const data = localStorage.getItem('cine_layout_v3');
            if(data) JSON.parse(data).forEach(item =&gt; {
                if(item.type === 'folder') {
                    const el = document.createElement('div'); el.className = 'desktop-app'; el.style.left=item.x; el.style.top=item.y; el.dataset.type='folder'; el.dataset.contents=item.contents;
                    let html=''; JSON.parse(item.contents).slice(0,4).forEach(id=&gt;html+=`&lt;img src=&quot;${getAppIcon(id)}&quot; class=&quot;folder-mini&quot;&gt;`);
                    el.innerHTML=`&lt;div class=&quot;folder-icon&quot;&gt;${html}&lt;/div&gt;&lt;div class=&quot;d-label&quot;&gt;Folder&lt;/div&gt;`;
                    el.addEventListener('mousedown',(e)=&gt;{e.stopPropagation();DragSystem.start(e,el,'desktop');});
                    document.getElementById('desktop-area').appendChild(el);
                } else createDesktopIcon({id:item.id,name:APPS[item.id]?.title||'App',icon:getAppIcon(item.id)}, parseFloat(item.x), parseFloat(item.y));
            });
        }

        const ctx = document.getElementById('snow-fx').getContext('2d');
        let w=window.innerWidth, h=window.innerHeight; document.getElementById('snow-fx').width=w; document.getElementById('snow-fx').height=h;
        const flakes = Array.from({length:100},()=&gt;({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2,s:Math.random()+0.5}));
        function drawSnow(){
            ctx.clearRect(0,0,w,h); ctx.fillStyle=&quot;rgba(255,255,255,0.4)&quot;;
            flakes.forEach(f=&gt;{ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();f.y+=f.s;if(f.y&gt;h)f.y=0;});
            requestAnimationFrame(drawSnow);
        }
        drawSnow();


        
        
        
        
        const wallpaperRegistry = {
            &quot;default&quot;: {
                id: &quot;default&quot;,
                name: &quot;Snake Skeleton (Default)&quot;,
                url: &quot;https://www.dropbox.com/scl/fi/2feyea5q3u0udsaov9n1r/snake-skeleton-chains-moewalls-com.mp4?rlkey=5v2lnyco9ktrlae9hjq6wndq6&amp;st=v0xn6t34&amp;raw=1&quot;,
