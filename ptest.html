<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: Inter, system-ui; }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #1e1e1e;
    overflow: hidden;
}

/* TOP BAR */
.browser-ui {
    height: 96px;
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid #111;
}

/* TABS */
.tabs {
    height: 38px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
}

.newtab {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #aaa;
    cursor: pointer;
}

/* NAVBAR */
.navbar {
    height: 58px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
}

.navbar button {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #bbb;
    cursor: pointer;
}

/* URL BAR */
.urlbar {
    flex: 1;
    height: 36px;
    background: #3a3a3a;
    border-radius: 18px;
    padding: 0 16px;
    display: flex;
    align-items: center;
}

.urlbar input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 14px;
}

/* IFRAME */
.viewframe {
    position: absolute;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100% - 96px);
    border: none;
}
</style>
</head>

<body>

<div class="browser-ui">
    <div class="tabs">
        <button class="newtab">+</button>
    </div>

    <div class="navbar">
        <button>←</button>
        <button>→</button>
        <button onclick="go()">⟳</button>

        <form class="urlbar" onsubmit="event.preventDefault(); go();">
            <input id="url" placeholder="Search or enter address">
        </form>

        <button>↗</button>
    </div>
</div>

<!-- THIS WAS MISSING -->
<iframe id="frame" class="viewframe"></iframe>

<script>
const frame = document.getElementById("frame")
const input = document.getElementById("url")

function normalize(u){
  if(!u.startsWith("http")) return "https://" + u
  return u
}

async function go(){
  const url = normalize(input.value)

  try{
    const res = await fetch(
      "https://api.codetabs.com/v1/proxy/?quest=" +
      encodeURIComponent(url)
    )

    const html = await res.text()

    const doc = new DOMParser()
      .parseFromString(html,"text/html")

    const base = doc.createElement("base")
    base.href = url
    doc.head.prepend(base)

    frame.srcdoc = doc.documentElement.outerHTML

  }catch{
    frame.srcdoc = "<h1 style='color:white'>Load failed</h1>"
  }
}
</script>

</body>
</html>
