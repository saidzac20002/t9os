<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UV Search</title>

<!-- UV Scripts -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

h1{margin-bottom:20px}

.search-box{
  display:flex;
  width:90%;
  max-width:600px;
}

input{
  flex:1;
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:8px 0 0 8px;
  outline:none;
}

button{
  padding:15px 25px;
  font-size:16px;
  border:none;
  cursor:pointer;
  background:#38bdf8;
  color:black;
  border-radius:0 8px 8px 0;
}

iframe{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
  display:none;
}
</style>
</head>

<body>

<h1>Ultraviolet Search</h1>

<div class="search-box">
  <input id="search" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
// Register Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/uv/sw.js");
}

const searchEngine = "https://www.google.com/search?q=";

function go(){
  let input = document.getElementById("search").value.trim();

  if(!input) return;

  let url;

  if(input.includes(".") && !input.includes(" ")){
    if(!input.startsWith("http"))
      input = "https://" + input;
    url = input;
  } else {
    url = searchEngine + encodeURIComponent(input);
  }

  const proxied = __uv$config.prefix + __uv$config.encodeUrl(url);

  const frame = document.getElementById("frame");
  frame.style.display="block";
  frame.src = proxied;
}
</script>

</body>
</html>
